<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  .header {
    background: #1a3c6e; color: white;
    padding: 16px 20px; position: sticky; top: 0; z-index: 100;

  .header h1 { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  }
  .tab-group, .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .tab-btn, .filter-btn {
    padding: 7px 13px; border-radius: 6px;

  }
  .tab-btn:hover, .filter-btn:hover { background: rgba(255,255,255,0.15); }
  .tab-btn.active { background: #e65100; border-color: #e65100; font-weight: 700; }
  .filter-btn.active { background: white; color: #1a3c6e; border-color: white; font-weight: 600; }
  .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.3); margin: 0 2px; align-self: center; }
  #stats { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 7px; }
  .list {
    max-width: 860px; margin: 18px auto;
    padding: 0 14px 40px; display: flex; flex-direction: column; gap: 10px;
  }
  .card {
    background: white; border-radius: 10px; padding: 15px 17px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid #1a3c6e; transition: box-shadow 0.15s;
  }
  .card.thongke { border-left-color: #6a1b9a; }
  .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.12); }
  .card-meta { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; flex-wrap: wrap; }
  .num-badge {
    color: white; font-size: 12px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; white-space: nowrap;
  }
  .num-badge.phapluat { background: #1a3c6e; }
  .num-badge.thongke  { background: #6a1b9a; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
  .tag.phapluat { background: #e3eaf4; color: #1a3c6e; }
  .tag.thongke  { background: #f3e5f5; color: #6a1b9a; }
  .tag.part     { background: #f0f0f0; color: #555; }
  .question { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 10px; color: #1a1a1a; }
  .answer {
    display: flex; align-items: flex-start; gap: 10px;
    border-radius: 7px; padding: 9px 12px;
  }
  .answer.phapluat { background: #f0f7ee; }
  .answer.thongke  { background: #f5f0fa; }
  .ans-badge {
    color: white; font-weight: 700; font-size: 13px;
    min-width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .ans-badge.phapluat { background: #2e7d32; }
  .ans-badge.thongke  { background: #6a1b9a; }
  .ans-text { font-size: 14px; line-height: 1.55; }
  .ans-text.phapluat { color: #1b4d1e; }
  .ans-text.thongke  { color: #4a148c; }
  mark { background: #fff176; border-radius: 2px; padding: 0 1px; }
  #empty { text-align: center; color: #888; padding: 60px 20px; font-size: 16px; display: none; }
</style>

<script>
const PL = [{"num": 1, "title": "Mục tiêu cốt lõi của quản lý nhà nước đối với hoạt động kinh doanh vận tải bằng xe ô tô là gì?", "letter": "B", "ans": "Bảo đảm an toàn giao thông, trật tự vận tải; thúc đẩy cạnh tranh lành mạnh và bảo vệ quyền, lợi ích hợp pháp của hành khách và người thuê vận tải.", "subject": "phapluat", "part": 1}, {"num": 2, "title": "Trong hoạt động vận tải bằng xe ô tô, khái niệm \"đơn vị kinh doanh vận tải\" được hiểu đúng nhất là gì?", "letter": "D", "ans": "Tổ chức hoặc cá nhân thực hiện hoạt động kinh doanh vận tải bằng xe ô tô và đáp ứng đầy đủ điều kiện kinh doanh theo quy định của pháp luật.", "subject": "phapluat", "part": 1}, {"num": 3, "title": "Trong hoạt động kinh doanh vận tải bằng xe ô tô, việc \"duy trì điều kiện kinh doanh\" có ý nghĩa pháp lý nào sau đây?", "letter": "D", "ans": "Đơn vị kinh doanh vận tải phải đáp ứng và duy trì đầy đủ các điều kiện kinh doanh trong toàn bộ quá trình hoạt động.", "subject": "phapluat", "part": 1}, {"num": 4, "title": "Hợp đồng vận chuyển hàng hóa hoặc hành khách trong hoạt động vận tải bằng xe ô tô có ý nghĩa pháp lý chủ yếu nào sau đây?", "letter": "D", "ans": "Là căn cứ xác lập quyền và nghĩa vụ của các bên trong quan hệ vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 5, "title": "Văn bản quy phạm pháp luật nào hiện nay quy định trực tiếp về kinh doanh và điều kiện kinh doanh vận tải bằng xe ô tô?", "letter": "D", "ans": "Nghị định số 158/2024/NĐ-CP của Chính phủ.", "subject": "phapluat", "part": 1}, {"num": 6, "title": "Khi có sự mâu thuẫn giữa quy định nội bộ của doanh nghiệp vận tải với quy định của pháp luật về vận tải đường bộ, nguyên tắc áp dụng nào sau đây là đúng?", "letter": "D", "ans": "Ưu tiên áp dụng quy định của pháp luật và văn bản quy phạm pháp luật có hiệu lực pháp lý cao hơn.", "subject": "phapluat", "part": 1}, {"num": 7, "title": "Vì sao cần phân loại chính xác loại hình kinh doanh vận tải bằng xe ô tô?", "letter": "B", "ans": "Để xác định đúng điều kiện kinh doanh, phù hiệu hoặc biển hiệu phương tiện, hồ sơ quản lý và nghĩa vụ dữ liệu tương ứng với từng loại hình vận tải.", "subject": "phapluat", "part": 1}, {"num": 8, "title": "Trong quản trị tuân thủ của doanh nghiệp vận tải, phần \"căn cứ pháp lý\" trong quy trình nội bộ nên được thể hiện như thế nào?", "letter": "A", "ans": "Ghi rõ tên văn bản pháp luật, số hoặc ký hiệu văn bản và điều khoản liên quan trực tiếp.", "subject": "phapluat", "part": 1}, {"num": 9, "title": "Trong kinh doanh vận tải bằng xe ô tô, phù hiệu hoặc biển hiệu phương tiện có ý nghĩa quản lý chủ yếu nào sau đây?", "letter": "C", "ans": "Là dấu hiệu nhận diện loại hình kinh doanh vận tải và phục vụ công tác quản lý nhà nước về vận tải.", "subject": "phapluat", "part": 1}, {"num": 10, "title": "Trong hoạt động vận tải bằng xe ô tô, việc quản lý dữ liệu từ thiết bị giám sát hành trình của phương tiện nhằm mục đích chủ yếu nào sau đây?", "letter": "B", "ans": "Theo dõi hành trình, tốc độ và thời gian lái xe để phục vụ công tác quản lý an toàn giao thông.", "subject": "phapluat", "part": 1}, {"num": 11, "title": "Trong quản lý doanh nghiệp vận tải, việc xây dựng bộ phận quản lý an toàn giao thông có ý nghĩa gì?", "letter": "A", "ans": "Theo dõi, giám sát hoạt động của phương tiện và người lái xe nhằm phòng ngừa tai nạn giao thông và nâng cao an toàn vận tải.", "subject": "phapluat", "part": 1}, {"num": 12, "title": "Trong quản trị tuân thủ của doanh nghiệp vận tải, việc xác định rõ căn cứ pháp lý cho quy trình nội bộ có ý nghĩa gì?", "letter": "B", "ans": "Giúp bảo đảm quy trình phù hợp với pháp luật, dễ kiểm tra, dễ cập nhật khi văn bản pháp luật thay đổi.", "subject": "phapluat", "part": 1}, {"num": 13, "title": "Trong quản trị doanh nghiệp vận tải, việc ban hành quy trình nội bộ bằng văn bản có ý nghĩa gì?", "letter": "C", "ans": "Thiết lập cơ chế quản lý thống nhất, phân định trách nhiệm và kiểm soát việc tuân thủ pháp luật trong toàn doanh nghiệp.", "subject": "phapluat", "part": 1}, {"num": 14, "title": "Khi văn bản pháp luật mới được ban hành thay thế văn bản cũ đang được viện dẫn trong quy trình nội bộ, doanh nghiệp nên làm gì?", "letter": "A", "ans": "Chủ động cập nhật quy trình nội bộ theo văn bản mới và phổ biến kịp thời cho người có liên quan để bảo đảm áp dụng đúng quy định hiện hành.", "subject": "phapluat", "part": 1}, {"num": 15, "title": "Việc xác định sai loại hình kinh doanh vận tải có thể dẫn đến hậu quả pháp lý nào?", "letter": "C", "ans": "Bị xử lý do hoạt động không đúng loại hình kinh doanh vận tải đã đăng ký hoặc đã được cấp phép.", "subject": "phapluat", "part": 1}, {"num": 16, "title": "Trong doanh nghiệp vận tải, việc rà soát định kỳ các quy trình nội bộ nhằm mục đích gì?", "letter": "A", "ans": "Bảo đảm quy trình luôn phù hợp với quy định pháp luật hiện hành và thực tiễn quản lý của doanh nghiệp.", "subject": "phapluat", "part": 1}, {"num": 17, "title": "Trong hoạt động vận tải bằng xe ô tô, cơ quan nhà nước nào có thẩm quyền cấp phù hiệu cho phương tiện kinh doanh vận tải?", "letter": "C", "ans": "Cơ quan chuyên môn về giao thông vận tải thuộc cấp tỉnh theo thẩm quyền quản lý nhà nước đối với hoạt động vận tải đường bộ.", "subject": "phapluat", "part": 1}, {"num": 18, "title": "Trong trường hợp phương tiện kinh doanh vận tải bị mất hoặc hỏng phù hiệu, đơn vị kinh doanh vận tải phải thực hiện biện pháp nào sau đây?", "letter": "C", "ans": "Thực hiện thủ tục đề nghị cấp lại phù hiệu theo quy định trước khi tiếp tục tổ chức hoạt động vận tải hợp pháp.", "subject": "phapluat", "part": 1}, {"num": 19, "title": "Dữ liệu từ thiết bị giám sát hành trình của xe kinh doanh vận tải phải được lưu trữ nhằm mục đích nào?", "letter": "A", "ans": "Phục vụ công tác quản lý, kiểm tra, thanh tra và hỗ trợ xác minh khi xảy ra tai nạn hoặc sự cố trong vận tải.", "subject": "phapluat", "part": 1}, {"num": 20, "title": "Trong doanh nghiệp vận tải, việc theo dõi dữ liệu hành trình của phương tiện có vai trò gì đối với quản lý an toàn?", "letter": "D", "ans": "Giúp phát hiện, cảnh báo và xử lý kịp thời các hành vi vi phạm như chạy quá tốc độ, lái xe quá thời gian hoặc hoạt động không đúng quy định.", "subject": "phapluat", "part": 1}, {"num": 21, "title": "Trong hoạt động kinh doanh vận tải bằng xe ô tô, giấy phép kinh doanh vận tải có ý nghĩa pháp lý gì?", "letter": "C", "ans": "Là điều kiện pháp lý bắt buộc để tổ chức, cá nhân được phép thực hiện hoạt động kinh doanh vận tải theo đúng loại hình và phạm vi được pháp luật cho phép.", "subject": "phapluat", "part": 1}, {"num": 22, "title": "Theo quy định quản lý vận tải, việc sử dụng phương tiện kinh doanh vận tải không gắn phù hiệu hợp lệ có thể dẫn đến hậu quả pháp lý nào?", "letter": "A", "ans": "Có thể bị xử lý theo quy định về điều kiện kinh doanh vận tải và bị buộc dừng hoạt động cho đến khi khắc phục vi phạm.", "subject": "phapluat", "part": 1}, {"num": 23, "title": "Trong doanh nghiệp vận tải, trách nhiệm quản lý hoạt động của lái xe thuộc về chủ thể nào?", "letter": "D", "ans": "Thuộc về đơn vị kinh doanh vận tải với tư cách là chủ thể tổ chức, điều hành và quản lý hoạt động vận tải.", "subject": "phapluat", "part": 1}, {"num": 24, "title": "Trong trường hợp thiết bị giám sát hành trình của xe kinh doanh vận tải bị hỏng, đơn vị vận tải phải làm gì?", "letter": "D", "ans": "Khẩn trương khắc phục hoặc thay thế thiết bị để bảo đảm việc giám sát hoạt động của phương tiện theo đúng quy định.", "subject": "phapluat", "part": 1}, {"num": 25, "title": "Trong hoạt động vận tải hành khách, hành khách có quyền cơ bản nào sau đây?", "letter": "C", "ans": "Được vận chuyển an toàn, đúng hành trình hoặc đúng thỏa thuận đã xác lập trong quan hệ vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 26, "title": "Trong vận tải hàng hóa, trách nhiệm bồi thường thiệt hại khi hàng hóa bị mất hoặc hư hỏng trong quá trình vận chuyển thuộc về ai?", "letter": "A", "ans": "Người vận chuyển, trừ trường hợp có thỏa thuận khác hoặc có căn cứ miễn trách nhiệm theo quy định của pháp luật.", "subject": "phapluat", "part": 1}, {"num": 27, "title": "Trong hoạt động vận tải, việc tổ chức đào tạo và tập huấn an toàn giao thông cho lái xe có ý nghĩa gì?", "letter": "B", "ans": "Nâng cao ý thức chấp hành pháp luật, kỹ năng nghề nghiệp và phòng ngừa tai nạn giao thông.", "subject": "phapluat", "part": 1}, {"num": 28, "title": "Trong quản lý doanh nghiệp vận tải, việc kiểm soát thời gian lái xe của lái xe nhằm mục đích gì?", "letter": "C", "ans": "Bảo đảm sức khỏe của lái xe, hạn chế tình trạng mệt mỏi và phòng ngừa tai nạn giao thông.", "subject": "phapluat", "part": 1}, {"num": 29, "title": "Trong hoạt động vận tải hàng hóa, chứng từ vận chuyển có vai trò gì?", "letter": "D", "ans": "Là căn cứ xác nhận việc giao nhận hàng hóa, nội dung vận chuyển và trách nhiệm của các bên liên quan.", "subject": "phapluat", "part": 1}, {"num": 30, "title": "Trong quản lý nhà nước về vận tải đường bộ, cơ quan nào có thẩm quyền quản lý nhà nước chuyên ngành về giao thông vận tải tại địa phương?", "letter": "A", "ans": "Cơ quan chuyên môn thuộc Ủy ban nhân dân cấp tỉnh được giao thực hiện chức năng quản lý nhà nước về giao thông vận tải theo phân công của pháp luật.", "subject": "phapluat", "part": 1}, {"num": 31, "title": "Theo quy định, \"taxi tải\" trong vận tải hàng hóa được hiểu đúng nhất là gì?", "letter": "C", "ans": "Xe ô tô có trọng tải từ 1.500 kg trở xuống vận chuyển hàng hóa và người thuê vận tải trả tiền theo đồng hồ tính tiền hoặc theo phần mềm tính tiền trên xe.", "subject": "phapluat", "part": 1}, {"num": 32, "title": "Đối với taxi tải, yêu cầu nhận diện bên ngoài phương tiện theo quy định nêu đúng là gì?", "letter": "C", "ans": "Phải niêm yết cụm từ \"TAXI TẢI\" theo mẫu ở mặt ngoài hai bên thành xe hoặc cánh cửa xe, kèm tên và số điện thoại của đơn vị kinh doanh vận tải.", "subject": "phapluat", "part": 1}, {"num": 33, "title": "Kinh doanh vận tải hàng hóa nguy hiểm cần tuân thủ thêm nhóm quy định nào ngoài điều kiện vận tải thông thường?", "letter": "D", "ans": "Phải tuân thủ quy định về hàng nguy hiểm, yêu cầu an toàn, bao gói, ghi nhãn, hồ sơ kèm theo và phương án ứng cứu sự cố.", "subject": "phapluat", "part": 1}, {"num": 34, "title": "Vận tải hàng hóa siêu trường, siêu trọng về bản chất là gì?", "letter": "A", "ans": "Vận chuyển hàng hóa không thể chia nhỏ hoặc tháo rời, khi vận chuyển làm cho phương tiện hoặc tổ hợp phương tiện vượt quá giới hạn cho phép về kích thước hoặc khối lượng khi tham gia giao thông đường bộ.", "subject": "phapluat", "part": 1}, {"num": 35, "title": "Kinh doanh vận tải hành khách theo tuyến cố định được hiểu đúng nhất là gì?", "letter": "D", "ans": "Vận chuyển hành khách theo tuyến, hành trình, lịch trình hoặc biểu đồ chạy xe và điểm đầu, điểm cuối đã được cơ quan có thẩm quyền công bố hoặc chấp thuận theo quy định.", "subject": "phapluat", "part": 1}, {"num": 36, "title": "Kinh doanh vận tải hành khách theo hợp đồng khác tuyến cố định ở điểm nào sau đây?", "letter": "C", "ans": "Vận tải hợp đồng thực hiện chuyến đi theo hợp đồng vận chuyển giữa đơn vị vận tải và bên thuê vận chuyển, không hoạt động theo tuyến cố định đã được công bố.", "subject": "phapluat", "part": 1}, {"num": 37, "title": "Khi vận chuyển hàng hóa, đơn vị kinh doanh vận tải hàng hóa phải cấp cho lái xe loại giấy tờ nào để mang theo trong quá trình vận chuyển trên đường?", "letter": "D", "ans": "Giấy vận tải hoặc giấy vận chuyển theo quy định do đơn vị kinh doanh vận tải hàng hóa phát hành.", "subject": "phapluat", "part": 1}, {"num": 38, "title": "Đối với xe taxi tải và xe tải kinh doanh vận tải hàng hóa, phù hiệu \"XE TẢI\" được dán theo quy định ở vị trí nào sau đây?", "letter": "A", "ans": "Dán cố định theo mẫu quy định trên mặt trong kính chắn gió phía trước của xe, bảo đảm thuận tiện cho việc nhận diện và kiểm tra.", "subject": "phapluat", "part": 1}, {"num": 39, "title": "Khi thực hiện vận tải hành khách theo hợp đồng, lái xe phải mang theo giấy tờ nào sau đây, trừ trường hợp pháp luật cho phép thay thế bằng dữ liệu điện tử?", "letter": "B", "ans": "Hợp đồng vận tải và danh sách hành khách theo quy định.", "subject": "phapluat", "part": 1}, {"num": 40, "title": "Đơn vị kinh doanh vận tải hành khách theo hợp đồng phải lưu trữ hợp đồng vận chuyển kèm danh sách hành khách tối thiểu trong thời gian bao lâu theo yêu cầu quản lý vận tải?", "letter": "B", "ans": "03 năm.", "subject": "phapluat", "part": 1}, {"num": 41, "title": "Trong hoạt động vận tải hàng hóa, \"hàng hóa nguy hiểm\" được hiểu là gì?", "letter": "C", "ans": "Hàng hóa có khả năng gây nguy hiểm cho con người, tài sản hoặc môi trường trong quá trình vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 42, "title": "Khi thực hiện vận chuyển hàng siêu trường, siêu trọng trên đường bộ, đơn vị vận tải phải tuân thủ yêu cầu pháp lý quan trọng nào sau đây?", "letter": "C", "ans": "Phải có giấy phép lưu hành đặc biệt hoặc văn bản chấp thuận của cơ quan có thẩm quyền đối với hành trình vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 43, "title": "Một trong những đặc điểm quan trọng của vận tải hành khách theo tuyến cố định là gì?", "letter": "B", "ans": "Hoạt động theo biểu đồ chạy xe, hành trình tuyến và điểm đầu cuối đã được cơ quan có thẩm quyền công bố hoặc chấp thuận.", "subject": "phapluat", "part": 1}, {"num": 44, "title": "Đối với vận tải hành khách theo hợp đồng, đặc điểm pháp lý nào sau đây là đúng?", "letter": "A", "ans": "Chuyến xe được thực hiện trên cơ sở hợp đồng vận chuyển được xác lập trước giữa đơn vị vận tải và bên thuê vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 45, "title": "Trong vận chuyển hàng nguy hiểm, người điều khiển phương tiện phải được trang bị kiến thức nào?", "letter": "D", "ans": "Kiến thức về nhận diện nguy cơ, xử lý sự cố và các biện pháp an toàn khi xảy ra rò rỉ, cháy nổ hoặc tình huống nguy hiểm khác.", "subject": "phapluat", "part": 1}, {"num": 46, "title": "Trong vận tải siêu trường, siêu trọng, việc vận chuyển thường phải kèm theo điều kiện nào sau đây?", "letter": "A", "ans": "Phải có giấy phép lưu hành đặc biệt hoặc sự chấp thuận của cơ quan có thẩm quyền về quản lý giao thông đối với hành trình vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 47, "title": "Trong vận tải hành khách tuyến cố định, việc tổ chức điểm dừng, đón trả khách phải tuân thủ nguyên tắc nào?", "letter": "D", "ans": "Chỉ được dừng, đón trả khách tại bến xe hoặc điểm dừng, điểm đón trả khách đã được cơ quan có thẩm quyền quy định hoặc chấp thuận.", "subject": "phapluat", "part": 1}, {"num": 48, "title": "Trong vận tải hành khách theo hợp đồng, danh sách hành khách có ý nghĩa pháp lý nào sau đây?", "letter": "C", "ans": "Là căn cứ xác định những người tham gia chuyến đi, phục vụ kiểm tra và chứng minh tính hợp pháp của hoạt động vận tải theo hợp đồng.", "subject": "phapluat", "part": 1}, {"num": 49, "title": "Trong vận chuyển hàng hóa nguy hiểm, việc đào tạo và huấn luyện an toàn cho người tham gia vận chuyển nhằm mục đích gì?", "letter": "D", "ans": "Trang bị kiến thức, kỹ năng xử lý tình huống nguy hiểm và bảo đảm an toàn cho người, phương tiện, hàng hóa và môi trường trong quá trình vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 50, "title": "Trong vận tải hàng hóa, trách nhiệm kiểm tra việc xếp hàng hóa đúng tải trọng phương tiện thuộc về ai?", "letter": "A", "ans": "Người điều khiển phương tiện và đơn vị kinh doanh vận tải.", "subject": "phapluat", "part": 1}, {"num": 51, "title": "Trong kinh doanh vận tải hành khách, bến xe khách có chức năng chính nào sau đây?", "letter": "A", "ans": "Là nơi tổ chức đón, trả hành khách và hỗ trợ điều hành, quản lý hoạt động vận tải hành khách theo tuyến.", "subject": "phapluat", "part": 1}, {"num": 52, "title": "Trong vận tải hành khách theo hợp đồng, nếu xảy ra tranh chấp về nghĩa vụ vận chuyển thì căn cứ quan trọng nhất để giải quyết là gì?", "letter": "D", "ans": "Hợp đồng vận chuyển giữa đơn vị vận tải và bên thuê vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 53, "title": "Trong vận chuyển hàng hóa nguy hiểm, phương tiện vận chuyển phải đáp ứng yêu cầu nào sau đây?", "letter": "C", "ans": "Phải đáp ứng yêu cầu kỹ thuật và được trang bị thiết bị an toàn phù hợp với loại hàng hóa nguy hiểm vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 54, "title": "Trong vận tải siêu trường, siêu trọng, việc khảo sát tuyến đường trước khi vận chuyển nhằm mục đích gì?", "letter": "D", "ans": "Đánh giá khả năng chịu tải của cầu, đường và xây dựng phương án vận chuyển an toàn.", "subject": "phapluat", "part": 1}, {"num": 55, "title": "Trong vận tải hành khách tuyến cố định, việc bán vé cho hành khách phải tuân thủ nguyên tắc nào?", "letter": "A", "ans": "Bán vé đúng giá đã niêm yết theo quy định.", "subject": "phapluat", "part": 1}, {"num": 56, "title": "Trong vận tải hành khách theo hợp đồng, đơn vị vận tải phải thực hiện nghĩa vụ nào đối với hành khách?", "letter": "A", "ans": "Bảo đảm an toàn cho hành khách trong suốt quá trình vận chuyển theo hợp đồng.", "subject": "phapluat", "part": 1}, {"num": 57, "title": "Trong vận chuyển hàng hóa nguy hiểm, việc gắn biển cảnh báo nguy hiểm trên phương tiện nhằm mục đích gì?", "letter": "C", "ans": "Thông báo cho người tham gia giao thông và lực lượng chức năng nhận biết loại hàng nguy hiểm đang được vận chuyển.", "subject": "phapluat", "part": 1}, {"num": 58, "title": "Trong vận tải siêu trường, siêu trọng, việc bố trí xe dẫn đường nhằm mục đích gì?", "letter": "D", "ans": "Hướng dẫn, cảnh báo và hỗ trợ bảo đảm an toàn giao thông khi phương tiện đặc biệt lưu thông.", "subject": "phapluat", "part": 1}, {"num": 59, "title": "Trong vận tải hành khách tuyến cố định, việc quản lý biểu đồ chạy xe nhằm mục đích gì?", "letter": "C", "ans": "Bảo đảm phương tiện hoạt động đúng lịch trình, điều tiết tần suất và duy trì trật tự khai thác trên tuyến.", "subject": "phapluat", "part": 1}, {"num": 60, "title": "Trong vận tải hành khách theo hợp đồng, có được bán vé lẻ cho từng hành khách như tuyến cố định hay không?", "letter": "A", "ans": "Không được bán vé lẻ vì chuyến đi được tổ chức theo hợp đồng vận chuyển, không theo cơ chế bán vé từng chỗ.", "subject": "phapluat", "part": 1}, {"num": 61, "title": "Giấy phép kinh doanh vận tải bằng xe ô tô thể hiện nội dung nào đúng nhất?", "letter": "C", "ans": "Xác nhận đơn vị được phép kinh doanh vận tải theo loại hình đã đăng ký và đáp ứng các điều kiện theo quy định.", "subject": "phapluat", "part": 1}, {"num": 62, "title": "Rủi ro pháp lý trọng yếu nếu đơn vị vận tải vẫn hoạt động khi giấy phép bị thu hồi hoặc bị đình chỉ là gì?", "letter": "D", "ans": "Bị xử lý, buộc dừng hoạt động và phát sinh rủi ro về hợp đồng, bảo hiểm, bồi thường thiệt hại.", "subject": "phapluat", "part": 1}, {"num": 63, "title": "\"Duy trì điều kiện kinh doanh\" trong suốt thời gian hoạt động được hiểu đúng nhất là gì?", "letter": "C", "ans": "Phải đáp ứng liên tục các điều kiện kinh doanh; khi có thay đổi về phương tiện, nhân sự, phạm vi hoặc loại hình thì phải bảo đảm điều kiện tương ứng và thực hiện việc cập nhật theo yêu cầu.", "subject": "phapluat", "part": 1}, {"num": 64, "title": "Khi mở rộng thêm loại hình kinh doanh vận tải, ví dụ từ vận tải hàng hóa sang taxi tải, đơn vị cần thực hiện đúng nhất việc gì?", "letter": "C", "ans": "Cập nhật hoặc đăng ký bổ sung loại hình theo quy định, đồng thời bảo đảm đủ điều kiện nhận diện, quản lý kinh doanh trước khi khai thác.", "subject": "phapluat", "part": 1}, {"num": 65, "title": "Trường hợp nào sau đây có nguy cơ cao bị coi là kinh doanh vận tải không đúng loại hình được cấp phép hoặc đăng ký?", "letter": "D", "ans": "Đơn vị được cấp phép vận tải hàng hóa nhưng tổ chức tính tiền theo đồng hồ hoặc phần mềm như taxi tải mà không đăng ký bổ sung loại hình.", "subject": "phapluat", "part": 1}, {"num": 66, "title": "Khi giấy phép kinh doanh vận tải sắp hết thời hạn hiệu lực, nếu pháp luật quy định có thời hạn, nguyên tắc quản trị tuân thủ đúng nhất là gì?", "letter": "A", "ans": "Chủ động rà soát điều kiện và nộp hồ sơ gia hạn hoặc cấp lại đúng thời điểm để không làm gián đoạn điều kiện pháp lý.", "subject": "phapluat", "part": 1}, {"num": 67, "title": "Trong quản trị rủi ro tuân thủ, việc phân công người điều hành vận tải có ý nghĩa nào sau đây?", "letter": "A", "ans": "Là đầu mối tổ chức, điều hành hoạt động vận tải và triển khai các yêu cầu về quản lý an toàn, giám sát hoạt động theo quy định.", "subject": "phapluat", "part": 1}, {"num": 68, "title": "Trong hoạt động vận tải, tài liệu nào là cơ sở nội bộ quan trọng để chứng minh doanh nghiệp đã quản trị an toàn thay vì buông lỏng cho lái xe tự vận hành?", "letter": "C", "ans": "Quy trình quản lý an toàn giao thông và hồ sơ đào tạo, nhắc nhở, kiểm tra định kỳ đối với lái xe.", "subject": "phapluat", "part": 1}, {"num": 69, "title": "Trong quan hệ hợp đồng vận tải, rủi ro phổ biến nếu doanh nghiệp vận tải hoạt động sai điều kiện giấy phép là gì?", "letter": "C", "ans": "Có thể bị xử lý và đồng thời phát sinh tranh chấp về hiệu lực hoặc việc thực hiện hợp đồng, cũng như trách nhiệm bồi thường khi có thiệt hại.", "subject": "phapluat", "part": 1}, {"num": 70, "title": "Khi cơ quan có thẩm quyền đình chỉ hoạt động kinh doanh vận tải theo quyết định xử lý vi phạm, biện pháp tuân thủ đúng nhất của doanh nghiệp là gì?", "letter": "A", "ans": "Tạm dừng hoạt động theo quyết định, khắc phục vi phạm, hoàn thiện điều kiện và chỉ hoạt động trở lại khi đủ căn cứ pháp lý.", "subject": "phapluat", "part": 1}, {"num": 71, "title": "Trong quản trị tuân thủ, khi thay đổi số lượng phương tiện, quyền sử dụng phương tiện hoặc phương án khai thác đội xe, yêu cầu quản trị đúng nhất là gì?", "letter": "A", "ans": "Rà soát lại điều kiện kinh doanh tương ứng, cập nhật hồ sơ đội xe và thực hiện việc thông báo hoặc cập nhật với cơ quan có thẩm quyền khi pháp luật yêu cầu.", "subject": "phapluat", "part": 1}, {"num": 72, "title": "Khi doanh nghiệp vận tải thay đổi người điều hành vận tải, biện pháp tuân thủ đúng nhất là gì?", "letter": "C", "ans": "Rà soát điều kiện của người mới và thực hiện thủ tục thông báo hoặc cập nhật theo yêu cầu để bảo đảm duy trì điều kiện kinh doanh.", "subject": "phapluat", "part": 1}, {"num": 73, "title": "Trong kinh doanh vận tải bằng xe ô tô, trường hợp nào sau đây là ví dụ điển hình về không duy trì điều kiện kinh doanh dù đã được cấp giấy phép?", "letter": "D", "ans": "Doanh nghiệp vẫn cho phương tiện hoạt động nhưng không còn đáp ứng yêu cầu về quản lý, giám sát hoặc hồ sơ theo quy định.", "subject": "phapluat", "part": 1}, {"num": 74, "title": "Trong quản trị tuân thủ, vì sao doanh nghiệp vận tải cần xây dựng cơ chế rà soát định kỳ hiệu lực các giấy tờ pháp lý như giấy phép, phù hiệu, hồ sơ phương tiện?", "letter": "C", "ans": "Để phòng ngừa việc hết hạn, thiếu điều kiện dẫn đến xử lý, đình chỉ hoạt động và phát sinh rủi ro về hợp đồng, bảo hiểm, bồi thường.", "subject": "phapluat", "part": 1}, {"num": 75, "title": "Trong vận tải hàng hóa, giấy vận tải hoặc giấy vận chuyển có ý nghĩa quản trị chủ yếu nào?", "letter": "C", "ans": "Là căn cứ quản trị chuyến hàng, thể hiện thông tin về hàng hóa, nơi đi, nơi đến, người gửi, người nhận và phục vụ kiểm tra khi cần thiết.", "subject": "phapluat", "part": 1}, {"num": 76, "title": "Trong quản trị dữ liệu vận tải, việc lưu trữ dữ liệu hành trình có tác dụng pháp lý nổi bật nào sau đây?", "letter": "D", "ans": "Là căn cứ hỗ trợ chứng minh quá trình vận hành phương tiện khi xảy ra tai nạn, khiếu nại hoặc tranh chấp.", "subject": "phapluat", "part": 1}, {"num": 77, "title": "Khi doanh nghiệp vận tải thuê xe của tổ chức hoặc cá nhân khác để đưa vào kinh doanh vận tải, yêu cầu tuân thủ quan trọng nhất là gì?", "letter": "A", "ans": "Phải bảo đảm xe đủ điều kiện đưa vào kinh doanh vận tải và thực hiện đầy đủ các thủ tục quản lý theo quy định về nhận diện, hồ sơ, giám sát và khai thác.", "subject": "phapluat", "part": 1}, {"num": 78, "title": "Trong quản trị tuân thủ, biện pháp nào sau đây thể hiện doanh nghiệp vận tải kiểm soát rủi ro an toàn giao thông một cách chủ động?", "letter": "D", "ans": "Thiết lập quy trình giám sát, cảnh báo vi phạm về tốc độ, thời gian lái xe và có cơ chế xử lý nội bộ phù hợp.", "subject": "phapluat", "part": 1}, {"num": 79, "title": "Khi bị thanh tra, kiểm tra hoạt động kinh doanh vận tải, nhóm hồ sơ nào sau đây là xương sống để chứng minh tuân thủ?", "letter": "C", "ans": "Hồ sơ pháp lý của đơn vị, hồ sơ phương tiện, hồ sơ lái xe, hồ sơ quản lý an toàn và dữ liệu giám sát theo quy định.", "subject": "phapluat", "part": 1}, {"num": 80, "title": "Trong quản trị tuân thủ, vì sao quy trình nội bộ của doanh nghiệp vận tải phải được cập nhật khi văn bản pháp luật thay đổi?", "letter": "A", "ans": "Vì quy trình nội bộ là công cụ triển khai tuân thủ; nếu không cập nhật thì dễ phát sinh vi phạm và làm tăng rủi ro bị xử lý, tranh chấp hoặc bồi thường.", "subject": "phapluat", "part": 1}, {"num": 81, "title": "Trong kinh doanh vận tải, trường hợp nào sau đây thể hiện đơn vị kinh doanh vận tải và người lái xe là hai chủ thể pháp lý khác nhau?", "letter": "D", "ans": "Đơn vị kinh doanh vận tải chịu trách nhiệm về điều kiện kinh doanh và tổ chức hoạt động; người lái xe chịu trách nhiệm về việc điều khiển phương tiện theo quy định.", "subject": "phapluat", "part": 2}, {"num": 82, "title": "Trong quản trị tuân thủ, biện pháp nào giúp doanh nghiệp giảm rủi ro bị xử lý do hồ sơ không đầy đủ khi thanh tra hoạt động vận tải?", "letter": "A", "ans": "Thiết lập danh mục hồ sơ bắt buộc theo từng loại hình, có quy chế lưu trữ, phân quyền cập nhật và kiểm tra định kỳ.", "subject": "phapluat", "part": 2}, {"num": 83, "title": "Trong vận tải hành khách, hành vi nào sau đây có nguy cơ cao bị coi là vi phạm quy định về đón, trả khách?", "letter": "C", "ans": "Đón, trả khách tùy tiện, không đúng nơi quy định, gây ảnh hưởng đến trật tự và an toàn giao thông.", "subject": "phapluat", "part": 2}, {"num": 84, "title": "Trong quản trị doanh nghiệp vận tải, vì sao cần niêm yết công khai giá cước hoặc giá vé theo quy định?", "letter": "A", "ans": "Để bảo đảm minh bạch, bảo vệ quyền lợi khách hàng và tạo căn cứ kiểm tra, giải quyết khiếu nại hoặc tranh chấp.", "subject": "phapluat", "part": 2}, {"num": 85, "title": "Trong vận tải hàng hóa, chứng từ nào có vai trò xác nhận việc giao nhận hàng hóa và hỗ trợ phân định trách nhiệm khi phát sinh tranh chấp?", "letter": "C", "ans": "Biên bản giao nhận hoặc chứng từ vận chuyển thể hiện tình trạng, số lượng hàng hóa khi nhận và khi giao.", "subject": "phapluat", "part": 2}, {"num": 86, "title": "Trong quản trị rủi ro bảo hiểm, vì sao doanh nghiệp vận tải cần kiểm soát chặt việc hoạt động đúng điều kiện kinh doanh?", "letter": "D", "ans": "Vì vi phạm điều kiện pháp lý có thể làm phát sinh tranh chấp về nghĩa vụ chi trả bảo hiểm và làm tăng rủi ro bồi thường.", "subject": "phapluat", "part": 2}, {"num": 87, "title": "Trong quản trị an toàn giao thông, nội dung nào sau đây cần ưu tiên kiểm soát đối với lái xe kinh doanh vận tải?", "letter": "B", "ans": "Thời gian lái xe, tốc độ vận hành và việc chấp hành quy trình an toàn.", "subject": "phapluat", "part": 2}, {"num": 88, "title": "Khi doanh nghiệp vận tải thay đổi địa điểm trụ sở hoặc nơi quản lý điều hành, nguyên tắc tuân thủ phù hợp là gì?", "letter": "D", "ans": "Rà soát nghĩa vụ cập nhật thông tin pháp lý và thông tin quản lý vận tải theo yêu cầu, bảo đảm toàn bộ hồ sơ thống nhất.", "subject": "phapluat", "part": 2}, {"num": 89, "title": "Trong vận tải hợp đồng, tài liệu nào giúp chứng minh chuyến xe được tổ chức đúng bản chất hợp đồng thay vì hoạt động như tuyến cố định?", "letter": "A", "ans": "Danh sách hành khách và hồ sơ chuyển đi gắn với hợp đồng vận chuyển.", "subject": "phapluat", "part": 2}, {"num": 90, "title": "Trong quản trị tuân thủ, vì sao doanh nghiệp vận tải phải xây dựng cơ chế tiếp nhận và xử lý khiếu nại của hành khách hoặc người thuê vận tải?", "letter": "B", "ans": "Vì đó là kênh kiểm soát chất lượng dịch vụ, phát hiện sớm vi phạm và giảm rủi ro tranh chấp, bồi thường.", "subject": "phapluat", "part": 2}, {"num": 91, "title": "Xe ô tô kinh doanh vận tải hàng hóa phải thuộc quyền sở hữu hoặc quyền sử dụng hợp pháp được hiểu đúng nhất là gì?", "letter": "C", "ans": "Có giấy tờ chứng minh quyền sở hữu hoặc có hợp đồng thuê, hợp tác bằng văn bản làm căn cứ cho quyền sử dụng hợp pháp theo quy định.", "subject": "phapluat", "part": 2}, {"num": 92, "title": "Quy định về niên hạn sử dụng phương tiện kinh doanh vận tải nhằm mục tiêu chủ yếu nào?", "letter": "C", "ans": "Bảo đảm an toàn kỹ thuật, hạn chế rủi ro do phương tiện quá cũ gây ra đối với hoạt động vận tải.", "subject": "phapluat", "part": 2}, {"num": 93, "title": "Đăng kiểm còn hiệu lực có vai trò gì trong quản trị vận tải?", "letter": "A", "ans": "Là căn cứ chứng minh phương tiện đủ điều kiện về an toàn kỹ thuật và bảo vệ môi trường để tham gia giao thông, khai thác vận tải.", "subject": "phapluat", "part": 2}, {"num": 94, "title": "Trong hồ sơ phương tiện kinh doanh vận tải, giấy tờ nào sau đây chứng minh phương tiện đã tham gia bảo hiểm trách nhiệm dân sự bắt buộc của chủ xe cơ giới?", "letter": "A", "ans": "Giấy chứng nhận bảo hiểm trách nhiệm dân sự bắt buộc của chủ xe cơ giới.", "subject": "phapluat", "part": 2}, {"num": 95, "title": "Đối với xe ô tô vận tải thuộc diện phải lắp thiết bị giám sát hành trình, mục đích quản trị tuân thủ quan trọng nhất là gì?", "letter": "D", "ans": "Giúp giám sát hành trình, tốc độ, thời gian hoạt động nhằm bảo đảm an toàn và phục vụ quản lý nhà nước.", "subject": "phapluat", "part": 2}, {"num": 96, "title": "Trong quản trị đội xe, hồ sơ lý lịch phương tiện nên bao gồm nội dung nào là cốt lõi?", "letter": "A", "ans": "Lịch sử bảo dưỡng, sửa chữa, thay thế phụ tùng và kết quả kiểm tra an toàn định kỳ của phương tiện.", "subject": "phapluat", "part": 2}, {"num": 97, "title": "Khi doanh nghiệp đưa xe thuê vào đội xe kinh doanh vận tải, nội dung quản trị nào sau đây là đúng và quan trọng nhất để tránh rủi ro khoán trắng cho chủ xe?", "letter": "C", "ans": "Doanh nghiệp phải tổ chức quản lý như đối với xe thuộc đội xe của mình, bao gồm hồ sơ phương tiện, phân công lái xe, quản lý an toàn, nhận diện và giám sát dữ liệu theo quy định.", "subject": "phapluat", "part": 2}, {"num": 98, "title": "Trường hợp nào sau đây là rủi ro tuân thủ phổ biến khi sử dụng giấy tờ mua bán viết tay làm căn cứ sở hữu xe kinh doanh vận tải?", "letter": "A", "ans": "Dễ phát sinh tranh chấp quyền sở hữu và không đủ căn cứ vững chắc để chứng minh quyền sở hữu hoặc quyền sử dụng hợp pháp khi kiểm tra.", "subject": "phapluat", "part": 2}, {"num": 99, "title": "Trong vận tải hàng hóa, việc kiểm soát tải trọng xe nhằm bảo đảm điều gì?", "letter": "A", "ans": "Bảo đảm an toàn giao thông và bảo vệ kết cấu hạ tầng đường bộ, tránh tình trạng quá tải gây tai nạn và hư hỏng công trình giao thông.", "subject": "phapluat", "part": 2}, {"num": 100, "title": "Trước khi cho xe xuất bến hoặc ra chuyến, kiểm tra nào sau đây là kiểm tra an toàn tối thiểu theo thông lệ quản trị vận tải?", "letter": "A", "ans": "Kiểm tra lốp, phanh, đèn, còi, gạt mưa và tình trạng rò rỉ nhiên liệu hoặc dầu.", "subject": "phapluat", "part": 2}, {"num": 101, "title": "Trong quản trị tuân thủ, trường hợp nào sau đây có thể bị coi là khai thác phương tiện không đủ điều kiện dù xe vẫn còn vận hành được?", "letter": "D", "ans": "Xe còn đăng kiểm nhưng đã quá niên hạn sử dụng theo quy định.", "subject": "phapluat", "part": 2}, {"num": 102, "title": "Khi đăng kiểm hết hiệu lực trong lúc xe đang khai thác, biện pháp tuân thủ đúng nhất là gì?", "letter": "C", "ans": "Dừng khai thác, đưa xe đi kiểm định lại và chỉ đưa vào hoạt động khi giấy chứng nhận kiểm định còn hiệu lực.", "subject": "phapluat", "part": 2}, {"num": 103, "title": "Trong kinh doanh vận tải hàng hóa, phù hiệu \"XE TẢI\" có ý nghĩa quản lý chủ yếu nào?", "letter": "D", "ans": "Nhận diện loại hình kinh doanh vận tải của phương tiện, phục vụ kiểm tra và quản lý nhà nước.", "subject": "phapluat", "part": 2}, {"num": 104, "title": "Trường hợp nào sau đây là sai về mối quan hệ giữa bảo hiểm và đăng kiểm trong quản trị tuân thủ?", "letter": "B", "ans": "Bảo hiểm có thể thay thế đăng kiểm.", "subject": "phapluat", "part": 2}, {"num": 105, "title": "Đối với xe vận tải hàng hóa, nghĩa vụ bảo dưỡng định kỳ có ý nghĩa tuân thủ nào?", "letter": "D", "ans": "Là căn cứ thể hiện doanh nghiệp đã thực hiện nghĩa vụ quản lý an toàn kỹ thuật và phòng ngừa rủi ro tai nạn.", "subject": "phapluat", "part": 2}, {"num": 106, "title": "Khi doanh nghiệp thay đổi biển số hoặc đăng ký xe do sang tên, đổi biển, yêu cầu quản trị hồ sơ đúng nhất là gì?", "letter": "C", "ans": "Cập nhật đồng bộ hồ sơ phương tiện, dữ liệu quản lý và các thủ tục liên quan theo yêu cầu pháp luật.", "subject": "phapluat", "part": 2}, {"num": 107, "title": "Khi vận chuyển hàng nguy hiểm, phương tiện vận tải phải bảo đảm yêu cầu nào sau đây?", "letter": "A", "ans": "Có biển cảnh báo hàng nguy hiểm và trang bị an toàn phù hợp với loại hàng vận chuyển.", "subject": "phapluat", "part": 2}, {"num": 108, "title": "Trường hợp nào sau đây thể hiện quyền sử dụng hợp pháp đối với xe đưa vào kinh doanh vận tải?", "letter": "C", "ans": "Có hợp đồng thuê xe bằng văn bản kèm giấy tờ xe hợp lệ và doanh nghiệp tổ chức quản lý, khai thác theo quy định.", "subject": "phapluat", "part": 2}, {"num": 109, "title": "Trong quản trị vận tải, sổ theo dõi sửa chữa, bảo dưỡng giúp phòng ngừa rủi ro nào rõ nhất?", "letter": "A", "ans": "Rủi ro sự cố kỹ thuật do không bảo dưỡng hoặc bảo dưỡng không đúng chu kỳ.", "subject": "phapluat", "part": 2}, {"num": 110, "title": "Trong quản trị tuân thủ, doanh nghiệp có thể bị xử lý vì lỗi gì nếu để xe kinh doanh vận tải hoạt động khi thiếu phù hiệu hoặc dấu hiệu nhận diện theo quy định?", "letter": "B", "ans": "Có thể bị xử phạt vi phạm hành chính và bị yêu cầu khắc phục, dừng khai thác phương tiện tùy theo tính chất, mức độ vi phạm.", "subject": "phapluat", "part": 2}, {"num": 111, "title": "Khi xe có dấu hiệu mất an toàn như phanh kém, lốp mòn, biện pháp tuân thủ đúng nhất là gì?", "letter": "C", "ans": "Tạm dừng khai thác để sửa chữa, khắc phục và chỉ đưa xe vào hoạt động khi bảo đảm an toàn kỹ thuật.", "subject": "phapluat", "part": 2}, {"num": 112, "title": "Trong vận tải hàng hóa, giấy vận tải hoặc giấy vận chuyển hỗ trợ tốt nhất cho nội dung quản trị nào?", "letter": "D", "ans": "Quản trị chuyến hàng và chứng minh thông tin vận chuyển khi kiểm tra, khiếu nại hoặc tranh chấp.", "subject": "phapluat", "part": 2}, {"num": 113, "title": "Trường hợp nào sau đây phản ánh sai quan điểm xe mới thì không cần đăng kiểm?", "letter": "D", "ans": "Xe mới không cần đăng kiểm trong mọi trường hợp.", "subject": "phapluat", "part": 2}, {"num": 114, "title": "Trong vận tải hàng hóa, việc che chắn, chằng buộc hàng hóa đúng quy cách nhằm bảo đảm điều gì?", "letter": "A", "ans": "Bảo đảm an toàn giao thông, tránh rơi vãi gây tai nạn và hạn chế hư hỏng hàng hóa.", "subject": "phapluat", "part": 2}, {"num": 115, "title": "Khi doanh nghiệp đưa xe thuê vào đội xe kinh doanh vận tải, nội dung nào sau đây phải được đồng bộ nhất trong quản trị hồ sơ?", "letter": "A", "ans": "Hồ sơ pháp lý của xe, căn cứ quyền sử dụng hợp pháp, dữ liệu hoặc dấu hiệu nhận diện và hồ sơ quản lý theo loại hình khai thác.", "subject": "phapluat", "part": 2}, {"num": 116, "title": "Trong quản trị tuân thủ, vì sao doanh nghiệp không nên để xe mượn bằng lời nói tham gia vận chuyển hàng hóa có thu tiền?", "letter": "A", "ans": "Vì khó chứng minh quyền sử dụng hợp pháp, dễ phát sinh tranh chấp và rủi ro bị xử lý về điều kiện kinh doanh.", "subject": "phapluat", "part": 2}, {"num": 117, "title": "Trong vận tải hàng hóa, yếu tố môi trường trong đăng kiểm phản ánh điều gì?", "letter": "C", "ans": "Mức độ đáp ứng yêu cầu về khí thải, tiếng ồn và tiêu chuẩn bảo vệ môi trường theo chế độ kiểm định.", "subject": "phapluat", "part": 2}, {"num": 118, "title": "Khi phát sinh thay đổi chủ sở hữu xe do sang tên, yêu cầu tuân thủ nào đúng nhất để xe tiếp tục kinh doanh vận tải hợp pháp?", "letter": "D", "ans": "Hoàn tất thủ tục sang tên theo quy định và cập nhật hồ sơ đội xe, hồ sơ quản lý liên quan nếu pháp luật yêu cầu.", "subject": "phapluat", "part": 2}, {"num": 119, "title": "Trong quản trị phương tiện, vì sao không được khai thác xe quá niên hạn dù giả định vẫn còn giấy tờ khác?", "letter": "B", "ans": "Vì niên hạn là điều kiện pháp lý độc lập, quá niên hạn thì bị cấm hoặc không được phép tiếp tục khai thác theo quy định.", "subject": "phapluat", "part": 2}, {"num": 120, "title": "Trong quản trị tuân thủ, bộ hồ sơ phương tiện kinh doanh vận tải tối thiểu nên có nhóm nào sau đây để sẵn sàng khi kiểm tra?", "letter": "C", "ans": "Giấy đăng ký xe hoặc căn cứ quyền sử dụng hợp pháp, đăng kiểm còn hiệu lực, bảo hiểm bắt buộc và hồ sơ quản lý đội xe theo loại hình vận tải.", "subject": "phapluat", "part": 2}, {"num": 121, "title": "Đối với một số loại hình vận tải, yêu cầu về trình độ chuyên môn của người điều hành vận tải được nêu đúng là gì?", "letter": "A", "ans": "Phải có trình độ hoặc chứng chỉ chuyên môn về vận tải theo yêu cầu của pháp luật đối với loại hình tương ứng.", "subject": "phapluat", "part": 2}, {"num": 122, "title": "Trong quản trị nhân sự vận tải, vì sao cần quản lý hồ sơ lái xe như giấy phép lái xe, sức khỏe, đào tạo?", "letter": "C", "ans": "Để chứng minh điều kiện hành nghề, giảm rủi ro tai nạn và giảm rủi ro pháp lý cho doanh nghiệp.", "subject": "phapluat", "part": 2}, {"num": 123, "title": "Khi lái xe vi phạm nghiêm trọng quy định an toàn và doanh nghiệp không có cơ chế giám sát, nhắc nhở, rủi ro pháp lý chính là gì?", "letter": "D", "ans": "Doanh nghiệp có thể bị đánh giá là không thực hiện đầy đủ nghĩa vụ quản lý, làm tăng rủi ro bị xử lý và rủi ro bồi thường.", "subject": "phapluat", "part": 2}, {"num": 124, "title": "Người điều hành hoạt động vận tải trong doanh nghiệp vận tải nên có trách nhiệm nào sau đây?", "letter": "D", "ans": "Thiết lập và giám sát quy trình an toàn, theo dõi hoạt động đội xe, phân công lái xe hợp lý và quản lý dữ liệu theo quy định.", "subject": "phapluat", "part": 2}, {"num": 125, "title": "Trong quản trị tuân thủ, tiêu chí nào sau đây giúp doanh nghiệp lựa chọn và bố trí lái xe phù hợp tuyến hoặc đội xe?", "letter": "B", "ans": "Kinh nghiệm lái xe, tình trạng sức khỏe, lịch sử vi phạm và mức độ đáp ứng yêu cầu đào tạo an toàn.", "subject": "phapluat", "part": 2}, {"num": 126, "title": "Yêu cầu khám sức khỏe đối với lái xe kinh doanh vận tải có ý nghĩa chính nào?", "letter": "C", "ans": "Để xác định khả năng đáp ứng điều kiện hành nghề và phòng ngừa nguy cơ tai nạn do lái xe không đủ sức khỏe.", "subject": "phapluat", "part": 2}, {"num": 127, "title": "Trong quản trị nhân sự vận tải, hành vi nào sau đây bị coi là khoán trắng trách nhiệm quản lý cho lái xe, làm tăng rủi ro pháp lý?", "letter": "A", "ans": "Chỉ giao xe và giao chỉ tiêu, không có kiểm tra hoặc giám sát việc tuân thủ tốc độ, thời gian lái xe và quy trình an toàn.", "subject": "phapluat", "part": 2}, {"num": 128, "title": "Khi phát hiện lái xe có dấu hiệu sử dụng rượu, bia hoặc chất kích thích trước ca làm việc, biện pháp quản trị đúng nhất là gì?", "letter": "D", "ans": "Tạm đình chỉ ca lái, lập biên bản nội bộ, yêu cầu kiểm tra và xử lý theo quy định của doanh nghiệp và pháp luật.", "subject": "phapluat", "part": 2}, {"num": 129, "title": "Trong tranh chấp bồi thường do tai nạn, tài liệu nào giúp doanh nghiệp chứng minh đã đào tạo và nhắc nhở lái xe tuân thủ quy trình an toàn?", "letter": "C", "ans": "Hồ sơ đào tạo, biên bản phổ biến quy định, sổ theo dõi nhắc nhở, kiểm tra và tài liệu xử lý vi phạm nếu có.", "subject": "phapluat", "part": 2}, {"num": 130, "title": "Khi ký hợp đồng lao động với lái xe, nội dung nào cần được thể hiện rõ để giảm tranh chấp trong vận tải?", "letter": "C", "ans": "Quyền, nghĩa vụ, phạm vi công việc, thời giờ làm việc, kỷ luật lao động và trách nhiệm vật chất hoặc bồi hoàn theo quy định.", "subject": "phapluat", "part": 2}, {"num": 131, "title": "Trong quản trị tuân thủ, vì sao doanh nghiệp cần quy chế xử lý vi phạm nội bộ đối với lái xe?", "letter": "D", "ans": "Để có cơ chế thống nhất trong nhắc nhở, kỷ luật và khắc phục vi phạm, đồng thời chứng minh doanh nghiệp đã quản lý an toàn.", "subject": "phapluat", "part": 2}, {"num": 132, "title": "Trường hợp doanh nghiệp giao xe cho lái xe nhưng không kiểm soát việc bàn giao và tình trạng xe, rủi ro pháp lý dễ phát sinh là gì?", "letter": "A", "ans": "Khó xác định trách nhiệm khi xe hư hỏng hoặc xảy ra tai nạn, dễ dẫn đến tranh chấp về trách nhiệm vật chất và bồi thường.", "subject": "phapluat", "part": 2}, {"num": 133, "title": "Đối với lái xe làm việc theo ca, kíp, yếu tố nào doanh nghiệp phải kiểm soát để tránh rủi ro an toàn do mệt mỏi?", "letter": "B", "ans": "Thời giờ làm việc, thời gian nghỉ ngơi và lịch phân công hợp lý.", "subject": "phapluat", "part": 2}, {"num": 134, "title": "Trong quản trị dữ liệu lái xe như giấy phép lái xe, hồ sơ sức khỏe, nguyên tắc nào là đúng để vừa tuân thủ vừa hạn chế rủi ro lộ lọt thông tin?", "letter": "C", "ans": "Phân quyền truy cập, lưu trữ an toàn và chỉ sử dụng đúng mục đích quản trị, tuân thủ quy định về bảo mật dữ liệu.", "subject": "phapluat", "part": 2}, {"num": 135, "title": "Khi doanh nghiệp thuê ngoài lái xe hoặc nhà thầu phụ để thực hiện chuyến vận tải, rủi ro tuân thủ lớn nhất là gì?", "letter": "D", "ans": "Rủi ro về điều kiện của lái xe, an toàn khai thác, trách nhiệm bồi thường và trách nhiệm hợp đồng nếu bên được thuê không đáp ứng yêu cầu.", "subject": "phapluat", "part": 2}, {"num": 136, "title": "Trong xử lý kỷ luật lao động đối với lái xe, nguyên tắc đúng theo pháp luật là gì?", "letter": "A", "ans": "Phải thực hiện đúng trình tự, căn cứ, chứng cứ và bảo đảm quyền giải trình theo quy định.", "subject": "phapluat", "part": 2}, {"num": 137, "title": "Mục tiêu của đào tạo định kỳ an toàn cho lái xe trong doanh nghiệp vận tải là gì?", "letter": "C", "ans": "Cập nhật quy định, củng cố kỹ năng an toàn và giảm tái phạm vi phạm, giảm nguy cơ tai nạn.", "subject": "phapluat", "part": 2}, {"num": 138, "title": "Khi xảy ra tai nạn, biện pháp quản trị nội bộ nào sau đây là cần thiết để giảm rủi ro tranh chấp?", "letter": "B", "ans": "Kích hoạt quy trình xử lý sự cố, ghi nhận hiện trường, báo cáo, phối hợp với cơ quan có thẩm quyền và lưu giữ đầy đủ hồ sơ, dữ liệu liên quan.", "subject": "phapluat", "part": 2}, {"num": 139, "title": "Trong quản trị nhân sự vận tải, vì sao cần theo dõi lịch sử vi phạm của lái xe?", "letter": "D", "ans": "Để đánh giá mức độ rủi ro, bố trí công việc phù hợp và có biện pháp đào tạo, giám sát tăng cường khi cần thiết.", "subject": "phapluat", "part": 2}, {"num": 140, "title": "Tiêu chí nào thể hiện doanh nghiệp vận tải quản trị văn hóa an toàn hiệu quả?", "letter": "A", "ans": "Có cơ chế thưởng, phạt minh bạch gắn với tuân thủ, ghi nhận nguy cơ hoặc sự cố suýt xảy ra và cải tiến quy trình thường xuyên.", "subject": "phapluat", "part": 2}, {"num": 141, "title": "Khi doanh nghiệp phát hiện hồ sơ giấy phép lái xe của lái xe có dấu hiệu không hợp lệ, xử lý nào đúng nhất?", "letter": "A", "ans": "Tạm dừng bố trí lái xe, xác minh tính hợp lệ của hồ sơ và chỉ sử dụng khi điều kiện đã được bảo đảm theo quy định.", "subject": "phapluat", "part": 2}, {"num": 142, "title": "Trong quản trị tuân thủ, việc xây dựng bảng mô tả công việc cho người điều hành vận tải nhằm mục tiêu gì?", "letter": "A", "ans": "Để xác định rõ trách nhiệm, chỉ tiêu tuân thủ và cơ chế kiểm soát nội bộ, tránh chồng chéo hoặc đùn đẩy trách nhiệm.", "subject": "phapluat", "part": 2}, {"num": 143, "title": "Trong quản trị nhân sự vận tải, nội dung nào sau đây cần được hồ sơ hóa để chứng minh doanh nghiệp đã phổ biến quy định an toàn?", "letter": "C", "ans": "Biên bản phổ biến quy định, danh sách ký nhận và tài liệu hướng dẫn quy trình an toàn.", "subject": "phapluat", "part": 2}, {"num": 144, "title": "Khi xảy ra thiệt hại do lỗi của lái xe trong khi thực hiện công việc được giao, nguyên tắc trách nhiệm dân sự thường được hiểu như thế nào?", "letter": "D", "ans": "Có thể phát sinh trách nhiệm bồi thường của doanh nghiệp đối với bên bị thiệt hại và quan hệ hoàn trả nội bộ tùy trường hợp theo quy định.", "subject": "phapluat", "part": 2}, {"num": 145, "title": "Trong quản trị tuân thủ, vì sao doanh nghiệp cần cơ chế ghi nhận các trường hợp gần xảy ra tai nạn?", "letter": "C", "ans": "Để phát hiện nguy cơ sớm, khắc phục trước khi xảy ra tai nạn thực tế và giảm tổn thất.", "subject": "phapluat", "part": 2}, {"num": 146, "title": "Trong quản trị ca làm, hành vi nào sau đây dễ dẫn tới tranh chấp lao động và rủi ro an toàn?", "letter": "B", "ans": "Ép lái xe làm việc kéo dài liên tục, không bảo đảm nghỉ ngơi và không ghi nhận đúng thời giờ làm việc.", "subject": "phapluat", "part": 2}, {"num": 147, "title": "Khi doanh nghiệp có nhiều đội xe hoặc nhiều đơn vị trực thuộc, mô hình kiểm soát tuân thủ hiệu quả nhất là gì?", "letter": "A", "ans": "Áp dụng quy trình chung thống nhất, kèm danh mục kiểm tra định kỳ và chế độ báo cáo tuân thủ theo từng tuyến hoặc từng đội xe.", "subject": "phapluat", "part": 2}, {"num": 148, "title": "Trong quản trị nhân sự, vì sao doanh nghiệp cần lưu hồ sơ tái đào tạo sau vi phạm của lái xe?", "letter": "D", "ans": "Vì tái đào tạo là biện pháp khắc phục, giúp giảm tái phạm và là chứng cứ cho thấy doanh nghiệp đã chấn chỉnh, không buông lỏng quản lý.", "subject": "phapluat", "part": 2}, {"num": 149, "title": "Khi người điều hành vận tải nghỉ việc hoặc thay đổi vị trí, rủi ro quản trị lớn nhất nếu không bàn giao đầy đủ là gì?", "letter": "D", "ans": "Làm đứt quãng việc điều hành đội xe, thất lạc hồ sơ tuân thủ và dữ liệu giám sát, từ đó tăng rủi ro bị xử lý khi kiểm tra.", "subject": "phapluat", "part": 2}, {"num": 150, "title": "Trong quản trị tuân thủ, doanh nghiệp cần ưu tiên xây dựng quy trình nào để \"khóa rủi ro\" ngay từ đầu đối với nhân sự lái xe mới tuyển?", "letter": "A", "ans": "Quy trình tiếp nhận, kiểm tra hồ sơ, đào tạo hội nhập, kèm cặp thử việc và đánh giá trước khi giao xe hoặc giao chuyến.", "subject": "phapluat", "part": 2}, {"num": 151, "title": "Trong vận tải hợp đồng hành khách, vì sao danh sách hành khách và hoặc lệnh vận chuyển là tài liệu quan trọng?", "letter": "A", "ans": "Để chứng minh chuyến xe đúng loại hình, đúng đối tượng vận chuyển và phục vụ kiểm tra, giải quyết sự cố.", "subject": "phapluat", "part": 2}, {"num": 152, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản nào nên được coi là bắt buộc về mặt quản trị rủi ro?", "letter": "A", "ans": "Điều khoản về bồi thường thiệt hại, giới hạn trách nhiệm và thời điểm chuyển giao rủi ro.", "subject": "phapluat", "part": 2}, {"num": 153, "title": "Nếu phát sinh thay đổi lịch trình hoặc hành trình so với hợp đồng, doanh nghiệp nên xử lý đúng là gì?", "letter": "A", "ans": "Ghi nhận thay đổi bằng phụ lục, biên bản hoặc xác nhận điện tử; thông báo cho bên thuê vận tải và cập nhật tài liệu quản lý chuyến theo đúng loại hình.", "subject": "phapluat", "part": 2}, {"num": 154, "title": "Trong vận tải hợp đồng hành khách, yêu cầu quan trọng khi lập danh sách hành khách để giảm rủi ro tranh chấp là gì?", "letter": "C", "ans": "Thể hiện tối thiểu các thông tin nhận diện cần thiết của hành khách và chuyến đi để đối chiếu khi kiểm tra hoặc khi xảy ra sự cố.", "subject": "phapluat", "part": 2}, {"num": 155, "title": "Trong hợp đồng vận chuyển hàng hóa, thời điểm chuyển giao rủi ro có ý nghĩa pháp lý chính nào?", "letter": "A", "ans": "Xác định thời điểm bên vận chuyển hoặc bên thuê chịu rủi ro đối với mất mát, hư hỏng hàng hóa theo thỏa thuận.", "subject": "phapluat", "part": 2}, {"num": 156, "title": "Nếu thay đổi điểm đón hoặc điểm trả trong vận tải hợp đồng, tài liệu phù hợp nhất để ghi nhận là gì?", "letter": "D", "ans": "Phụ lục hợp đồng hoặc xác nhận điện tử kèm cập nhật lệnh vận chuyển.", "subject": "phapluat", "part": 2}, {"num": 157, "title": "Trong vận tải hợp đồng hành khách, việc quản lý mã chuyến vận tải có ý nghĩa gì?", "letter": "C", "ans": "Giúp đồng bộ dữ liệu giữa hợp đồng, lệnh vận chuyển và danh sách hành khách.", "subject": "phapluat", "part": 2}, {"num": 158, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản giới hạn trách nhiệm chủ yếu nhằm mục tiêu gì?", "letter": "A", "ans": "Thiết lập mức trần trách nhiệm theo thỏa thuận hợp pháp, giúp dự liệu mức bồi thường và quản trị rủi ro.", "subject": "phapluat", "part": 2}, {"num": 159, "title": "Khi thay đổi lịch trình do nguyên nhân bất khả kháng, phương án xử lý đúng về quản trị rủi ro là gì?", "letter": "A", "ans": "Chủ động thông báo, ghi nhận sự kiện và phương án thay thế, đồng thời lưu chứng cứ để chứng minh lý do khách quan.", "subject": "phapluat", "part": 2}, {"num": 160, "title": "Trong vận tải hợp đồng hành khách, tài liệu nào giúp đối chiếu đúng chuyến, đúng hợp đồng tốt nhất khi có phản ánh hoặc kiểm tra?", "letter": "D", "ans": "Bộ tài liệu chuyến gồm hợp đồng hoặc hợp đồng điện tử, lệnh vận chuyển và danh sách hành khách tương ứng.", "subject": "phapluat", "part": 2}, {"num": 161, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản về địa điểm giao, nhận quan trọng nhất ở điểm nào?", "letter": "C", "ans": "Là căn cứ xác định nghĩa vụ giao hàng, nhận hàng, nghiệm thu và thời điểm hoàn thành dịch vụ. D. Không cần nếu hai bên quen biết.", "subject": "phapluat", "part": 3}, {"num": 162, "title": "Nếu thay đổi hành trình nhưng không lập xác nhận hoặc phụ lục, rủi ro tranh chấp phổ biến nhất là gì?", "letter": "D", "ans": "Khó chứng minh nội dung thỏa thuận mới, dễ tranh chấp về cước phát sinh, thời gian, trách nhiệm chậm trễ hoặc sự cố.", "subject": "phapluat", "part": 3}, {"num": 163, "title": "Trong vận tải hợp đồng hành khách, vì sao cần thống nhất đầu mối đại diện bên thuê trong hồ sơ?", "letter": "A", "ans": "Để xác định người có thẩm quyền xác nhận thay đổi, phát sinh và xử lý sự cố, tránh tranh chấp về việc ai đã đồng ý. B. Chỉ để tiện gọi điện. C. Không cần thiết. D. Để tăng thêm phụ phí.", "subject": "phapluat", "part": 3}, {"num": 164, "title": "Trong hợp đồng vận chuyển hàng hóa, chứng từ nào thường được dùng để chứng minh đã giao nhận hàng theo thực tế?", "letter": "A", "ans": "Biên bản giao nhận hoặc phiếu giao hàng có xác nhận của bên nhận, hoặc xác nhận điện tử hợp lệ. B. Ảnh chụp kho hàng. C. Thông báo miệng. D. Chỉ cần hóa đơn.", "subject": "phapluat", "part": 3}, {"num": 165, "title": "Khi thay đổi lịch trình làm phát sinh cước hoặc phụ phí, cách ghi nhận đúng nhất là gì?", "letter": "C", "ans": "Ghi nhận phát sinh bằng phụ lục, biên bản hoặc xác nhận điện tử làm căn cứ thanh toán. D. Không cần ghi nhận vì khách đã sử dụng dịch vụ.", "subject": "phapluat", "part": 3}, {"num": 166, "title": "Trong vận tải hợp đồng hành khách, lệnh vận chuyển chủ yếu thể hiện nội dung nào?", "letter": "C", "ans": "Thông tin tổ chức chuyến gồm xe, lái xe, thời gian, hành trình, điểm đón, điểm trả gắn với hợp đồng và danh sách hành khách. D. Chỉ là giấy mang tính hình thức.", "subject": "phapluat", "part": 3}, {"num": 167, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản về thời hạn khiếu nại có tác dụng chính nào?", "letter": "D", "ans": "Giúp các bên xác lập khung thời gian hợp lý để thông báo tổn thất và thu thập chứng cứ, hạn chế khiếu nại kéo dài.", "subject": "phapluat", "part": 3}, {"num": 168, "title": "Khi thay đổi hành trình có yếu tố rủi ro như đèo dốc hoặc đường xấu, biện pháp quản trị rủi ro phù hợp nhất là gì?", "letter": "A", "ans": "Đánh giá rủi ro, cập nhật kế hoạch an toàn và hướng dẫn lái xe trước khi thực hiện chuyến đi. B. Chỉ thông báo miệng cho lái xe. C. Cho lái xe tự quyết định hoàn toàn. D. Không cần thay đổi gì.", "subject": "phapluat", "part": 3}, {"num": 169, "title": "Việc lưu giữ hồ sơ chuyến trong vận tải hợp đồng nhằm mục tiêu chính nào?", "letter": "A", "ans": "Chứng minh tuân thủ loại hình, phục vụ thanh toán và xử lý sự cố, tranh chấp. B. Để in ấn cho đẹp. C. Không cần thiết. D. Chỉ để lưu kho tài liệu.", "subject": "phapluat", "part": 3}, {"num": 170, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản loại trừ trách nhiệm chỉ hợp lý khi nào?", "letter": "C", "ans": "Khi phù hợp pháp luật, xác định rõ phạm vi và không trái nguyên tắc thiện chí, trung thực. D. Khi khách hàng không đọc kỹ hợp đồng.", "subject": "phapluat", "part": 3}, {"num": 171, "title": "Nếu thay đổi lịch trình dẫn đến thay đổi thời gian giao hàng, doanh nghiệp nên ưu tiên chứng cứ nào?", "letter": "B", "ans": "Xác nhận của bên thuê bằng văn bản hoặc điện tử kèm cập nhật hồ sơ chuyến. C. Lời kể riêng của lái xe. D. Chỉ ghi nhớ trong đầu.", "subject": "phapluat", "part": 3}, {"num": 172, "title": "Trong vận tải hợp đồng hành khách, đúng đối tượng vận chuyển được hiểu thực chất là gì?", "letter": "C", "ans": "Chỉ chở đúng nhóm hành khách theo hợp đồng và danh sách đã lập, không đón khách vãng lai như tuyến cố định. D. Chỉ chở người quen của đơn vị vận tải.", "subject": "phapluat", "part": 3}, {"num": 173, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản về mô tả hàng hóa cần chặt chẽ nhất ở nội dung nào?", "letter": "A", "ans": "Tên hàng, đặc tính, số lượng hoặc khối lượng, tình trạng, yêu cầu bảo quản và tính chất đặc thù nếu có. B. Sở thích của người gửi hàng. C. Màu đồng phục của lái xe. D. Dự báo thời tiết tại điểm giao nhận.", "subject": "phapluat", "part": 3}, {"num": 174, "title": "Nếu thay đổi hành trình làm phát sinh điểm đón, trả mới trong vận tải hợp đồng, rủi ro pháp lý lớn nhất là gì?", "letter": "D", "ans": "Có thể bị coi là hoạt động sai loại hình nếu phát sinh việc đón khách vãng lai ngoài danh sách.", "subject": "phapluat", "part": 3}, {"num": 175, "title": "Trong vận tải hợp đồng hành khách, yêu cầu quản trị nào giúp bảo vệ quyền lợi hành khách khi xảy ra sự cố?", "letter": "A", "ans": "Có đầu mối liên hệ xử lý sự cố, lưu thông tin chuyến và phối hợp cứu hộ, đồng thời lưu hồ sơ phục vụ bồi thường khi cần. B. Chỉ xin lỗi là đủ. C. Tắt điện thoại để tránh áp lực. D. Không cần vì rủi ro do hành khách tự chịu.", "subject": "phapluat", "part": 3}, {"num": 176, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản về xếp dỡ quan trọng nhất vì lý do nào?", "letter": "A", "ans": "Vì quyết định ai chịu trách nhiệm xếp dỡ, phương tiện, dụng cụ, an toàn và rủi ro hư hỏng trong quá trình xếp dỡ. B. Vì quyết định màu xe. C. Vì làm tăng nghĩa vụ tài chính. D. Vì để trang trí hợp đồng.", "subject": "phapluat", "part": 3}, {"num": 177, "title": "Trong quản trị vận tải, việc phân tích dữ liệu hành trình của phương tiện giúp doanh nghiệp đạt mục tiêu nào?", "letter": "A", "ans": "Phát hiện vi phạm về tốc độ, thời gian hoạt động và điều chỉnh kế hoạch vận hành, an toàn. B. Tăng quảng cáo dịch vụ. C. Không có ý nghĩa thực tế. D. Chỉ để lưu trữ cho đủ hồ sơ.", "subject": "phapluat", "part": 3}, {"num": 178, "title": "Trong vận tải hợp đồng hành khách, việc thu thập và lưu thông tin hành khách cần tuân thủ nguyên tắc nào để giảm rủi ro pháp lý?", "letter": "C", "ans": "Chỉ thu thông tin tối thiểu cần thiết, sử dụng đúng mục đích và quản lý truy cập an toàn. D. Chuyển dữ liệu cho bên thứ ba để khai thác.", "subject": "phapluat", "part": 3}, {"num": 179, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản về bảo hiểm nên được hiểu đúng nhất là gì?", "letter": "A", "ans": "Là cơ chế phân tán rủi ro, nhưng không đương nhiên loại trừ trách nhiệm hợp đồng nếu có lỗi hoặc vi phạm nghĩa vụ. B. Không cần vì đã có hợp đồng. C. Chỉ để làm đẹp hồ sơ. D. Bảo hiểm thay thế toàn bộ nghĩa vụ bồi thường.", "subject": "phapluat", "part": 3}, {"num": 180, "title": "Trong quản trị hợp đồng vận tải, nguyên tắc nào giúp doanh nghiệp \"khóa\" rủi ro chứng cứ tốt nhất?", "letter": "D", "ans": "Lưu hồ sơ theo bộ gồm hợp đồng, phụ lục, lệnh vận chuyển, danh sách hoặc chứng từ giao nhận, xác nhận phát sinh; thống nhất mã chuyến và lưu kèm chứng cứ điện tử có thời gian.", "subject": "phapluat", "part": 3}, {"num": 181, "title": "Trong quản trị tuân thủ phương tiện hàng hóa, hành vi nào dưới đây bị xem là rủi ro tuân thủ nghiêm trọng liên quan đến phù hiệu \"XE TẢI\", dù xe vẫn đủ đăng kiểm?", "letter": "A", "ans": "Xe chưa được cấp hoặc cấp lại phù hiệu hợp lệ nhưng vẫn đưa vào khai thác kinh doanh vận tải. B. Xe được cấp phù hiệu, dán đúng vị trí và còn thời hạn. C. Xe có hợp đồng vận chuyển và giấy vận tải đầy đủ. D. Xe có gắn thiết bị giám sát hành trình theo quy định.", "subject": "phapluat", "part": 3}, {"num": 182, "title": "Trong quản trị tuân thủ của doanh nghiệp vận tải, khi phương tiện kinh doanh vận tải bị thay đổi thông tin đăng ký như biển số, giấy đăng ký xe hoặc chủ sở hữu, yêu cầu xử lý nào sau đây là đúng nhất?", "letter": "C", "ans": "Phải rà soát, cập nhật đồng bộ hồ sơ phương tiện, dữ liệu quản lý và thực hiện các thủ tục liên quan theo quy định trước khi tiếp tục khai thác hợp pháp. D. Chỉ cần thay lại logo hoặc số điện thoại trên thân xe.", "subject": "phapluat", "part": 3}, {"num": 183, "title": "Nếu doanh nghiệp dùng phù hiệu sai loại hình, ví dụ xe hợp đồng nhưng dùng phù hiệu khác, rủi ro phù hợp nhất là gì?", "letter": "A", "ans": "Có thể bị xử lý do vi phạm quy định về nhận diện, điều kiện kinh doanh và bị đánh giá hoạt động không đúng loại hình. B. Được giảm phí vận hành. C. Được ưu tiên khi qua trạm. D. Không phát sinh hậu quả pháp lý.", "subject": "phapluat", "part": 3}, {"num": 184, "title": "Mục đích cốt lõi của phù hiệu hoặc biển hiệu trong vận tải ô tô là gì?", "letter": "A", "ans": "Nhận diện phương tiện kinh doanh vận tải, phục vụ quản lý nhà nước và kiểm tra tuân thủ theo loại hình. B. Trang trí cho đẹp. C. Chỉ để xin giảm phí đường bộ. D. Thay thế đăng kiểm.", "subject": "phapluat", "part": 3}, {"num": 185, "title": "Niêm yết tên và số điện thoại đơn vị trên phương tiện chủ yếu giúp giảm rủi ro nào sau đây?", "letter": "A", "ans": "Giúp minh bạch, hỗ trợ phản ánh chất lượng dịch vụ và phục vụ truy xuất khi xảy ra sự cố hoặc tranh chấp. B. Không giảm rủi ro nào. C. Chỉ để quảng cáo. D. Chỉ để tài xế gọi điện thuận tiện.", "subject": "phapluat", "part": 3}, {"num": 186, "title": "Theo Nghị định 158/2024/NĐ-CP, phạm vi áp dụng phù hiệu \"XE TẢI\" dưới đây là đúng nhất?", "letter": "D", "ans": "Áp dụng cho xe đầu kéo kéo rơ moóc hoặc sơ mi rơ moóc kinh doanh vận tải hàng hóa, xe tải kinh doanh vận tải hàng hóa thông thường và taxi tải.", "subject": "phapluat", "part": 3}, {"num": 187, "title": "Nếu dán phù hiệu \"XE TẢI\" không đúng vị trí quy định, nhận định đúng nhất là gì?", "letter": "A", "ans": "Bị coi là không tuân thủ yêu cầu về cách thức nhận diện theo quy định, có nguy cơ bị xử lý và buộc khắc phục. B. Không ảnh hưởng vì cơ quan chức năng vẫn có thể nhận diện được. C. Chỉ cần chụp ảnh lưu hồ sơ là đủ. D. Vẫn hợp lệ vì miễn là có dán.", "subject": "phapluat", "part": 3}, {"num": 188, "title": "Ý nghĩa quản trị quan trọng nhất của việc quy định mẫu phù hiệu tại Phụ lục XIII Nghị định 158/2024/NĐ-CP là gì?", "letter": "A", "ans": "Thống nhất nhận diện theo mẫu, giảm tranh cãi khi kiểm tra và bảo đảm áp dụng đồng bộ trên toàn quốc. B. Để doanh nghiệp tự thiết kế cho đẹp. C. Chỉ nhằm tăng chi phí in ấn. D. Không có ý nghĩa quản trị nào.", "subject": "phapluat", "part": 3}, {"num": 189, "title": "Trường hợp đơn vị chấm dứt sử dụng xe trong hoạt động kinh doanh vận tải, như bán xe hoặc hết hạn thuê xe, biện pháp quản trị tuân thủ đúng nhất liên quan đến phù hiệu là gì?", "letter": "C", "ans": "Tháo gỡ hoặc thu hồi phù hiệu, cập nhật hồ sơ phương tiện theo quy định để tránh xe tiếp tục lưu thông với nhận diện kinh doanh vận tải. D. Che phù hiệu bằng băng dính là đủ.", "subject": "phapluat", "part": 3}, {"num": 190, "title": "Nội dung nào dưới đây phản ánh đúng nhất mối quan hệ giữa phù hiệu và điều kiện kinh doanh trong vận tải ô tô?", "letter": "A", "ans": "Phù hiệu là yếu tố nhận diện gắn với loại hình và là một thành tố thể hiện việc đáp ứng điều kiện theo quy định. B. Phù hiệu chỉ là giấy tờ nội bộ, không liên quan điều kiện kinh doanh. C. Chỉ cần có phù hiệu là đủ, không cần giấy phép kinh doanh vận tải. D. Phù hiệu thay thế hợp đồng vận chuyển.", "subject": "phapluat", "part": 3}, {"num": 191, "title": "Theo Nghị định 158/2024/NĐ-CP, vị trí dán phù hiệu \"XE TUYẾN CỐ ĐỊNH\" được quy định thống nhất như thế nào?", "letter": "D", "ans": "Dán cố định tại góc trên bên phải, ngay sát phía dưới vị trí tem kiểm định, ở mặt trong kính chắn gió phía trước của xe.", "subject": "phapluat", "part": 3}, {"num": 192, "title": "Trong quản trị tuân thủ pháp luật của doanh nghiệp vận tải, khi xây dựng biểu mẫu hoặc quy trình nội bộ dựa trên văn bản pháp luật, nguyên tắc cập nhật nào sau đây là đúng nhất?", "letter": "A", "ans": "Chỉ sử dụng văn bản pháp luật còn hiệu lực và rà soát các văn bản sửa đổi, bổ sung để bảo đảm nội dung áp dụng là phiên bản hiện hành. B. Chỉ cần sử dụng văn bản ban hành đầu tiên vì đã quen áp dụng. C. Tự bổ sung thêm các yêu cầu ngoài quy định pháp luật để \"chắc chắn hơn\". D. Lấy mẫu từ các tài liệu trên mạng mà không cần kiểm tra nguồn pháp lý.", "subject": "phapluat", "part": 3}, {"num": 193, "title": "Khi doanh nghiệp phát hiện xe đang hoạt động kinh doanh vận tải nhưng phù hiệu đã bong tróc hoặc rách, xử lý đúng nhất về quản trị tuân thủ là gì?", "letter": "D", "ans": "Tạm dừng khai thác nếu cần, thực hiện cấp hoặc đổi phù hiệu theo quy trình và khôi phục nhận diện hợp lệ trước khi tiếp tục hoạt động.", "subject": "phapluat", "part": 3}, {"num": 194, "title": "Đối với taxi tải, nội dung nhận diện \"TAXI TẢI\" theo Nghị định 158/2024/NĐ-CP được hiểu đúng nhất là gì?", "letter": "A", "ans": "Phải niêm yết cụm từ \"TAXI TẢI\" theo mẫu hoặc nhận diện tương ứng để phân biệt loại hình và phục vụ quản lý. B. Chỉ cần dán mã QR là đủ. C. Chỉ cần sơn màu vàng toàn bộ xe. D. Không cần nhận diện vì đây là xe chở hàng.", "subject": "phapluat", "part": 3}, {"num": 195, "title": "Khi lập quy trình nội bộ về phù hiệu hoặc biển hiệu, lỗi tuân thủ nghiêm trọng nhất là gì?", "letter": "A", "ans": "Không cập nhật mẫu và nội dung sửa đổi theo văn bản hiện hành, dẫn đến tiếp tục áp dụng tiêu chí đã bị bãi bỏ. B. In phù hiệu trên giấy dày hay mỏng. C. Chọn kiểu chữ trình bày. D. Sắp xếp thư mục lưu trữ hồ sơ.", "subject": "phapluat", "part": 3}, {"num": 196, "title": "Nhận định nào đúng nhất về mối quan hệ giữa phù hiệu và tem kiểm định trong quy định vị trí dán phù hiệu?", "letter": "C", "ans": "Phù hiệu được quy định dán sát phía dưới vị trí tem kiểm định tại góc trên bên phải mặt trong kính chắn gió phía trước để thống nhất kiểm tra. D. Phù hiệu phải dán ở kính sau để tránh che tầm nhìn.", "subject": "phapluat", "part": 3}, {"num": 197, "title": "Khi xây dựng checklist kiểm tra xe trước khi xuất bến, nội dung nào sau đây nên được đưa vào để kiểm soát tuân thủ nhận diện?", "letter": "A", "ans": "Có phù hiệu đúng loại hình, còn nguyên vẹn và dán đúng vị trí theo quy định. B. Tài xế thích nghe thể loại nhạc gì. C. Xe có dán thêm sticker trang trí hay không. D. Xe có đổ đầy nhiên liệu hay không.", "subject": "phapluat", "part": 3}, {"num": 198, "title": "Đối với xe buýt, quy định về vị trí dán phù hiệu \"XE BUÝT\" theo Nghị định 158/2024/NĐ-CP là gì?", "letter": "A", "ans": "Dán cố định tại góc trên bên phải ngay sát phía dưới vị trí tem kiểm định, ở mặt trong kính chắn gió phía trước của xe. B. Dán ở kính sau, phía bên phải. C. Dán ở cánh cửa lên xuống. D. Dán trên nóc xe.", "subject": "phapluat", "part": 3}, {"num": 199, "title": "Trong vận tải taxi, quy định về vị trí dán phù hiệu \"XE TAXI\" theo Nghị định 158/2024/NĐ-CP được nêu đúng nhất là gì?", "letter": "D", "ans": "Dán cố định tại góc trên bên phải ngay sát phía dưới vị trí tem kiểm định, ở mặt trong kính chắn gió phía trước của xe.", "subject": "phapluat", "part": 3}, {"num": 200, "title": "Đối với xe hợp đồng, quy định về vị trí dán phù hiệu \"XE HỢP ĐỒNG\" theo quy định hiện hành là:", "letter": "A", "ans": "Dán cố định tại góc trên bên phải, ngay sát phía dưới vị trí Tem kiểm định, ở mặt trong kính chắn gió phía trước của xe. B. Dán ở kính sau. C. Dán ở nóc xe. D. Dán ở cánh cửa.", "subject": "phapluat", "part": 3}, {"num": 201, "title": "Biện pháp nào sau đây giúp hạn chế rủi ro \"đúng phù hiệu nhưng sai loại hình khai thác\"?", "letter": "D", "ans": "Thiết lập quy trình kiểm soát chuyến đi, tài liệu chuyến, điểm đón trả đúng thỏa thuận; đào tạo lái xe và giám sát thực hiện đúng loại hình.", "subject": "phapluat", "part": 3}, {"num": 202, "title": "Trong hồ sơ tuân thủ nội bộ, việc lưu bằng chứng về vị trí dán phù hiệu đúng quy định có ý nghĩa thực tiễn nhất là:", "letter": "A", "ans": "Là căn cứ chứng minh đã tuân thủ yêu cầu nhận diện khi bị kiểm tra hoặc khi phát sinh khiếu nại, tranh chấp liên quan đến chuyến xe. B. Chỉ để làm đẹp hồ sơ nội bộ. C. Chỉ để phục vụ truyền thông doanh nghiệp. D. Không có giá trị gì.", "subject": "phapluat", "part": 3}, {"num": 203, "title": "Nếu doanh nghiệp sử dụng biểu mẫu nhận diện vẫn ghi \"có phản quang\" sau ngày 15/7/2024, nhận định đúng nhất là:", "letter": "C", "ans": "Có nguy cơ áp dụng sai nội dung hiện hành, cần rà soát và chỉnh sửa biểu mẫu nội bộ cho phù hợp. D. Bắt buộc phải ghi như vậy từ năm 2026.", "subject": "phapluat", "part": 3}, {"num": 204, "title": "Khi rà soát tuân thủ đội xe tải, câu hỏi kiểm tra nào dưới đây là trọng tâm đúng quy định?", "letter": "A", "ans": "Xe có phù hiệu \"XE TẢI\" đúng loại hình, đúng mẫu và dán đúng vị trí theo quy định hay không. B. Xe có gắn thêm loa ngoài hay không. C. Xe có dán tem phong thủy hay không. D. Lái xe có thích chạy ban đêm hay không.", "subject": "phapluat", "part": 3}, {"num": 205, "title": "Trong quản trị rủi ro, việc niêm yết thông tin liên hệ đơn vị trên xe chủ yếu hỗ trợ quy trình nào sau đây?", "letter": "A", "ans": "Quy trình tiếp nhận phản ánh, khiếu nại và truy xuất chuyến xe để xử lý sự cố, tranh chấp. B. Quy trình cấp đổi giấy phép lái xe. C. Quy trình bảo dưỡng kỹ thuật định kỳ. D. Quy trình đăng kiểm phương tiện.", "subject": "phapluat", "part": 3}, {"num": 206, "title": "Với phương tiện vận tải, nhận định đúng nhất về phù hiệu là:", "letter": "A", "ans": "Phù hiệu là yêu cầu nhận diện bắt buộc theo từng loại hình, phải dán cố định đúng vị trí theo quy định để phục vụ kiểm tra. B. Phù hiệu chỉ áp dụng cho xe chở khách, không áp dụng cho xe hàng. C. Phù hiệu chỉ là giấy tờ, không cần dán lên xe. D. Phù hiệu là quyền muốn dán hay không là tùy doanh nghiệp.", "subject": "phapluat", "part": 3}, {"num": 207, "title": "Trong kiểm tra tuân thủ, dấu hiệu nào dễ bị coi là \"không đồng bộ nhận diện\" và gây rủi ro bị xử lý?", "letter": "A", "ans": "Xe dán đúng phù hiệu nhưng dán sai vị trí theo quy định. B. Xe được lau kính sạch sẽ. C. Xe có trang bị nước uống cho khách. D. Xe có mùi thơm dễ chịu.", "subject": "phapluat", "part": 3}, {"num": 208, "title": "Khi soạn quy trình nội bộ về quản lý phù hiệu, cách trình bày căn cứ pháp lý chuẩn nhất là:", "letter": "C", "ans": "Ghi rõ tên văn bản, số ký hiệu và nội dung điều khoản có liên quan trực tiếp đến nghĩa vụ thực hiện. D. Không cần nêu căn cứ để khỏi rườm rà.", "subject": "phapluat", "part": 3}, {"num": 209, "title": "Nếu doanh nghiệp muốn chuẩn hóa nội dung đào tạo nội bộ về nhận diện xe, nhóm nội dung nào nên ưu tiên?", "letter": "A", "ans": "Quy định về phù hiệu hoặc biển hiệu theo loại hình, mẫu nhận diện, vị trí dán, thông tin niêm yết bắt buộc và các lỗi thường gặp khi kiểm tra. B. Mẹo marketing và thiết kế logo. C. Kỹ thuật chụp ảnh đẹp. D. Các câu chuyện truyền cảm hứng không liên quan pháp lý.", "subject": "phapluat", "part": 3}, {"num": 210, "title": "Nhận định nào đúng nhất về tính thống nhất vị trí dán giữa nhiều loại phù hiệu theo quy định hiện hành?", "letter": "D", "ans": "Nhiều loại phù hiệu được quy định dán thống nhất tại góc trên bên phải, sát dưới Tem kiểm định, ở mặt trong kính chắn gió phía trước để thuận tiện kiểm tra.", "subject": "phapluat", "part": 3}, {"num": 211, "title": "Trong quản lý vận tải hiện đại, dữ liệu hành trình hoặc hoạt động xe có giá trị pháp lý và quản trị nào?", "letter": "D", "ans": "Hỗ trợ chứng minh quá trình vận chuyển, kiểm soát tuân thủ, điều tra sự cố và giải quyết tranh chấp.", "subject": "phapluat", "part": 3}, {"num": 212, "title": "Nguyên tắc bảo vệ dữ liệu trong doanh nghiệp vận tải khi triển khai phần mềm quản lý khách hàng hoặc đơn hàng nên là:", "letter": "C", "ans": "Thu thập tối thiểu cần thiết, có mục đích rõ ràng, phân quyền truy cập, lưu trữ an toàn và tuân thủ quy định về bảo vệ dữ liệu. D. Công khai toàn bộ dữ liệu cho nhiều bộ phận cùng dùng.", "subject": "phapluat", "part": 3}, {"num": 213, "title": "Khi dùng ứng dụng đặt xe hoặc điều phối chuyến, doanh nghiệp nên kiểm soát yếu tố nào để tránh rủi ro biến tướng loại hình?", "letter": "D", "ans": "Kiểm soát quy trình đặt chuyến, tài liệu điện tử của chuyến và cách xác lập quan hệ vận chuyển đúng loại hình đã đăng ký.", "subject": "phapluat", "part": 3}, {"num": 214, "title": "Trong quản trị tuân thủ, vì sao phải định danh và lưu vết người thao tác trên phần mềm điều hành?", "letter": "C", "ans": "Để truy trách nhiệm, ngăn sửa hoặc xóa dữ liệu trái phép và phục vụ kiểm tra, giải quyết tranh chấp. D. Không cần vì chỉ cần tin tưởng nội bộ.", "subject": "phapluat", "part": 3}, {"num": 215, "title": "Khi doanh nghiệp thuê nhà cung cấp phần mềm hoặc dịch vụ đám mây để lưu dữ liệu khách hàng, kiểm soát quan trọng nhất là:", "letter": "B", "ans": "Hợp đồng phải có điều khoản về bảo mật, phân quyền, sao lưu, xử lý sự cố và trách nhiệm rò rỉ dữ liệu. C. Chỉ cần nhà cung cấp quảng cáo mạnh. D. Không cần hợp đồng.", "subject": "phapluat", "part": 3}, {"num": 216, "title": "Dữ liệu hành trình hoặc đơn hàng cần được sao lưu nhằm mục tiêu nào dưới đây?", "letter": "C", "ans": "Bảo đảm khả năng khôi phục khi lỗi hệ thống hoặc tấn công mạng, giảm rủi ro gián đoạn vận hành và rủi ro chứng cứ. D. Không cần sao lưu.", "subject": "phapluat", "part": 3}, {"num": 217, "title": "Khi số hóa hợp đồng vận chuyển, như hợp đồng điện tử hoặc xác nhận điện tử, yêu cầu quản trị đúng là:", "letter": "D", "ans": "Phải bảo đảm tính xác thực, khả năng truy xuất, lưu trữ và liên kết được với chuyến xe hoặc đơn hàng tương ứng.", "subject": "phapluat", "part": 3}, {"num": 218, "title": "Trong doanh nghiệp vận tải, dữ liệu nào sau đây thường chứa dữ liệu cá nhân và phải quản trị cẩn trọng?", "letter": "B", "ans": "Họ tên, số điện thoại khách hàng, điểm đón trả, lịch sử chuyến và phản ánh dịch vụ. C. Mã phụ tùng nội bộ. D. Danh sách cây xăng đối tác.", "subject": "phapluat", "part": 3}, {"num": 219, "title": "Để tránh rủi ro biến tướng loại hình khi dùng ứng dụng điều phối, yếu tố nào phải được khóa theo quy trình?", "letter": "C", "ans": "Khóa logic loại hình, gồm điều kiện nhận chuyến, tài liệu chuyến và cách xác lập quan hệ vận chuyển đúng loại hình đã đăng ký. D. Không cần khóa gì.", "subject": "phapluat", "part": 3}, {"num": 220, "title": "Khi xảy ra tai nạn hoặc tranh chấp, dữ liệu hành trình có giá trị mạnh nhất ở điểm nào?", "letter": "D", "ans": "Giúp xác định mốc thời gian, tuyến đường và trạng thái vận hành để hỗ trợ tái dựng sự kiện.", "subject": "phapluat", "part": 3}, {"num": 221, "title": "Nguyên tắc \"thu thập tối thiểu\" trong bảo vệ dữ liệu được hiểu đúng là:", "letter": "C", "ans": "Chỉ thu đúng phần dữ liệu cần cho mục đích vận chuyển hoặc quản trị và không mở rộng tùy tiện. D. Thu rồi bán lại để khai thác thương mại.", "subject": "phapluat", "part": 3}, {"num": 222, "title": "Khi tích hợp AI để chấm điểm rủi ro lái xe, doanh nghiệp nên ưu tiên kiểm soát:", "letter": "B", "ans": "Tính minh bạch của tiêu chí, hạn chế thiên lệch, phân quyền người xem dữ liệu và cơ chế giải trình hoặc khiếu nại nội bộ. C. Công khai bảng xếp hạng cho toàn công ty. D. Không cần kiểm soát vì máy tính đã xử lý.", "subject": "phapluat", "part": 3}, {"num": 223, "title": "Dữ liệu nào không nên cho nhân viên trực tổng đài xem nếu nhiệm vụ không yêu cầu?", "letter": "C", "ans": "Thông tin thanh toán nhạy cảm hoặc giấy tờ định danh chi tiết khi không cần cho công việc. D. Điểm trả hàng.", "subject": "phapluat", "part": 3}, {"num": 224, "title": "Trong quản trị tuân thủ, cảnh báo nào giúp nhận biết rủi ro \"tuyến cố định trá hình\" trong vận tải hợp đồng?", "letter": "A", "ans": "Bán vé lẻ hoặc đón trả khách thường xuyên như tuyến cố định, lặp giờ lặp điểm và thiếu tài liệu chuyến đúng loại hình. B. Có hợp đồng điện tử hợp lệ và danh sách hành khách theo chuyến. C. Có tổng đài chăm sóc khách hàng. D. Có logo thương hiệu rõ ràng.", "subject": "phapluat", "part": 3}, {"num": 225, "title": "Khi khách hàng yêu cầu xóa dữ liệu, doanh nghiệp nên:", "letter": "D", "ans": "Có quy trình tiếp nhận, xác minh và xử lý, đồng thời bảo đảm các nghĩa vụ lưu giữ dữ liệu tối thiểu phục vụ pháp lý nếu có.", "subject": "phapluat", "part": 3}, {"num": 226, "title": "Khi xảy ra sự cố rò rỉ dữ liệu, hành động quản trị ưu tiên là:", "letter": "C", "ans": "Khoanh vùng, ngăn chặn truy cập rủi ro, ghi nhận sự cố, khắc phục và thực hiện quy trình thông báo, đánh giá theo quy định nội bộ và pháp luật. D. Đổ lỗi cho khách hàng.", "subject": "phapluat", "part": 3}, {"num": 227, "title": "Trong quản lý dữ liệu vận tải, \"tính toàn vẹn dữ liệu\" được hiểu đúng nhất là:", "letter": "B", "ans": "Dữ liệu không bị sửa hoặc xóa trái phép, có cơ chế phát hiện thay đổi và truy xuất lịch sử thao tác. C. Dữ liệu nhìn đẹp, trình bày chuẩn. D. Dữ liệu dùng một phông chữ thống nhất.", "subject": "phapluat", "part": 3}, {"num": 228, "title": "Doanh nghiệp nên đặt thời hạn lưu trữ dữ liệu theo hướng nào để giảm rủi ro?", "letter": "C", "ans": "Lưu theo mục đích và yêu cầu pháp lý; hết mục đích thì xóa, ẩn hoặc ẩn danh phù hợp. D. Không cần chính sách lưu trữ.", "subject": "phapluat", "part": 3}, {"num": 229, "title": "Khi kết nối dữ liệu vận tải với đối tác, kiểm soát quan trọng nhất là:", "letter": "D", "ans": "Chia sẻ đúng phạm vi cần thiết, có thỏa thuận hoặc hợp đồng về chia sẻ dữ liệu và phân quyền truy cập rõ ràng.", "subject": "phapluat", "part": 3}, {"num": 230, "title": "Để chứng minh chuyến xe tuân thủ loại hình, doanh nghiệp nên bảo đảm dữ liệu nào có thể truy xuất nhanh?", "letter": "C", "ans": "Mã chuyến, thời điểm nhận và trả, tuyến hoặc điểm đi đến, người lái, phương tiện và bộ tài liệu chuyến tương ứng. D. Bảng KPI marketing.", "subject": "phapluat", "part": 3}, {"num": 231, "title": "Khi thiết kế ứng dụng đặt xe, điều khoản nào giúp giảm tranh chấp nhất?", "letter": "A", "ans": "Điều khoản về phạm vi dịch vụ, giá, điều kiện hủy, thời điểm xác lập hợp đồng và cơ chế khiếu nại, hoàn tiền, bồi thường. B. Điều khoản \"chúng tôi không chịu trách nhiệm gì\". C. Điều khoản về màu nền ứng dụng. D. Điều khoản khẩu hiệu thương hiệu.", "subject": "phapluat", "part": 3}, {"num": 232, "title": "Trong kiểm soát tuân thủ, vì sao không nên dùng tài khoản dùng chung cho điều hành hoặc chăm sóc khách hàng?", "letter": "C", "ans": "Vì làm mất khả năng truy trách nhiệm, tăng rủi ro sửa dữ liệu hoặc che giấu sai phạm.", "subject": "phapluat", "part": 3}, {"num": 233, "title": "Biện pháp nào phù hợp nhất để giảm rủi ro lộ dữ liệu khi nhân viên nghỉ việc?", "letter": "D", "ans": "Thu hồi tài khoản, đổi mật khẩu liên quan, khóa thiết bị và rà soát các quyền truy cập còn tại.", "subject": "phapluat", "part": 3}, {"num": 234, "title": "Khi áp dụng định vị hoặc ghi nhận hành trình cho lái xe, mục tiêu tuân thủ hợp lý nhất là:", "letter": "C", "ans": "Phục vụ an toàn, điều phối và chứng minh chuyến vận tải; đồng thời giới hạn phạm vi theo đúng mục đích quản trị.", "subject": "phapluat", "part": 3}, {"num": 235, "title": "Khi khách phản ánh \"tôi không đi chuyến này\", dữ liệu nào giúp doanh nghiệp xử lý hiệu quả nhất?", "letter": "B", "ans": "Nhật ký đơn hàng, dữ liệu hành trình, thông tin lái xe và phương tiện, cùng lịch sử liên lạc liên quan đến chuyến.", "subject": "phapluat", "part": 3}, {"num": 236, "title": "Khi dùng dữ liệu để đào tạo AI dự báo nhu cầu vận tải, cách làm giảm rủi ro nhất
