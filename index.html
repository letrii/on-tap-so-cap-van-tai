 là:", "letter": "C", "ans": "Ưu tiên ẩn danh hoặc giảm định danh, chỉ dùng dữ liệu cần thiết và kiểm soát truy cập vào kho dữ liệu huấn luyện.", "subject": "phapluat", "part": 3}, {"num": 237, "title": "Doanh nghiệp nên công bố nội dung nào trong thông báo hoặc điều khoản về dữ liệu để bảo đảm minh bạch?", "letter": "B", "ans": "Mục đích thu thập, loại dữ liệu, thời hạn lưu, bên được chia sẻ, quyền của chủ thể dữ liệu và kênh liên hệ.", "subject": "phapluat", "part": 3}, {"num": 238, "title": "Khi cơ quan có thẩm quyền yêu cầu xuất trình thông tin phục vụ kiểm tra, doanh nghiệp nên:", "letter": "C", "ans": "Trích xuất đúng phạm vi, đúng thẩm quyền, đúng yêu cầu; bảo đảm dữ liệu không bị sửa, xóa và có dấu vết chứng minh nguồn trích xuất.", "subject": "phapluat", "part": 3}, {"num": 239, "title": "Trong kiểm soát nội bộ, chỉ số nào phản ánh rủi ro tuân thủ dữ liệu cao nhất?", "letter": "D", "ans": "Số lượng tài khoản không rõ chủ, quyền truy cập quá rộng và không có nhật ký truy cập.", "subject": "phapluat", "part": 3}, {"num": 240, "title": "Khi dùng thuật toán tự động phân chuyến, kiểm soát nào giúp giảm rủi ro khiếu nại nhất?", "letter": "C", "ans": "Có tiêu chí phân chuyến rõ ràng, cơ chế rà soát hoặc can thiệp của người quản lý và lưu vết quyết định.", "subject": "phapluat", "part": 3}, {"num": 241, "title": "Trong doanh nghiệp vận tải, vì sao cần quy chế phân công trách nhiệm giữa giám đốc, điều hành vận tải, an toàn và pháp chế?", "letter": "D", "ans": "Để xác định rõ người chịu trách nhiệm, giảm rủi ro bỏ sót nghĩa vụ tuân thủ và tạo cơ chế kiểm soát nội bộ.", "subject": "phapluat", "part": 4}, {"num": 242, "title": "Quản lý thời gian làm việc và nghỉ ngơi của lái xe quan trọng nhất để phòng ngừa rủi ro nào?", "letter": "B", "ans": "Rủi ro tai nạn do mệt mỏi và rủi ro vi phạm quy định lao động, an toàn.", "subject": "phapluat", "part": 4}, {"num": 243, "title": "Trong quản trị rủi ro, việc mua bảo hiểm như bảo hiểm trách nhiệm dân sự bắt buộc, bảo hiểm hàng hóa có tác dụng đúng nhất là:", "letter": "C", "ans": "Chia sẻ rủi ro tài chính khi tai nạn hoặc sự cố phát sinh trách nhiệm bồi thường.", "subject": "phapluat", "part": 4}, {"num": 244, "title": "Trong kiểm soát nội bộ, cơ chế nào giúp giảm rủi ro \"đổ lỗi, không ai chịu trách nhiệm\" khi xảy ra sự cố?", "letter": "B", "ans": "Sơ đồ trách nhiệm rõ ràng, quy trình báo cáo, phê duyệt và lưu vết quyết định.", "subject": "phapluat", "part": 4}, {"num": 245, "title": "Biện pháp quản trị nào hiệu quả nhất để phòng ngừa lái xe chạy quá sức?", "letter": "C", "ans": "Lập lịch ca kíp, quy định thời gian nghỉ bắt buộc, giám sát qua dữ liệu hành trình và áp dụng kỷ luật khi vi phạm.", "subject": "phapluat", "part": 4}, {"num": 246, "title": "Khi mua bảo hiểm hàng hóa, điều khoản quản trị rủi ro quan trọng nhất cần kiểm tra là:", "letter": "C", "ans": "Phạm vi bảo hiểm, điều khoản loại trừ, mức khấu trừ, giới hạn trách nhiệm và quy trình thông báo tổn thất.", "subject": "phapluat", "part": 4}, {"num": 247, "title": "Trong doanh nghiệp vận tải, vì sao cần quy trình báo cáo sự cố và các trường hợp suýt tai nạn?", "letter": "D", "ans": "Để phát hiện sớm nguyên nhân, khắc phục phòng ngừa và chứng minh doanh nghiệp đã thực hiện quản lý an toàn.", "subject": "phapluat", "part": 4}, {"num": 248, "title": "Khi điều động lái xe chạy tuyến dài, yêu cầu hồ sơ nào giúp giảm rủi ro lao động nhất?", "letter": "C", "ans": "Hợp đồng lao động hoặc thỏa thuận công việc, hồ sơ sức khỏe phù hợp, đào tạo an toàn và phân ca đúng quy định.", "subject": "phapluat", "part": 4}, {"num": 249, "title": "Trong quản trị hợp đồng, tài liệu nào giúp giảm rủi ro \"không chứng minh được giao, nhận hàng\"?", "letter": "B", "ans": "Biên bản giao nhận hoặc phiếu xuất kho, ký nhận, chứng từ vận tải và các chứng cứ bổ trợ như ảnh hoặc định vị nếu có.", "subject": "phapluat", "part": 4}, {"num": 250, "title": "Khi thuê xe hoặc thuê lái xe theo hợp đồng dịch vụ, rủi ro pháp lý thường gặp nhất là gì?", "letter": "C", "ans": "Rủi ro trách nhiệm liên đới và tranh chấp do không rõ chủ thể quản lý an toàn, bảo hiểm và bồi thường.", "subject": "phapluat", "part": 4}, {"num": 251, "title": "Trong quản trị tuân thủ, vì sao cần kiểm tra định kỳ điều kiện phương tiện như đăng kiểm, bảo dưỡng, lốp, phanh?", "letter": "D", "ans": "Để phòng ngừa tai nạn do lỗi kỹ thuật và chứng minh doanh nghiệp đã quản lý phương tiện đúng trách nhiệm.", "subject": "phapluat", "part": 4}, {"num": 252, "title": "Trong bảo hiểm trách nhiệm dân sự bắt buộc của chủ xe cơ giới, nhận định nào đúng?", "letter": "B", "ans": "Bảo hiểm hỗ trợ chi trả theo phạm vi bảo hiểm, nhưng doanh nghiệp vẫn có trách nhiệm dân sự và nghĩa vụ phối hợp giải quyết bồi thường.", "subject": "phapluat", "part": 4}, {"num": 253, "title": "Khi xảy ra tai nạn, việc lưu trữ hồ sơ sự cố như biên bản hiện trường, ảnh, dữ liệu hành trình giúp doanh nghiệp nhiều nhất ở điểm nào?", "letter": "C", "ans": "Giúp giải quyết bồi thường, tranh chấp, bảo hiểm và chứng minh việc quản lý an toàn.", "subject": "phapluat", "part": 4}, {"num": 254, "title": "Trong kiểm soát nội bộ, bộ phận pháp chế trong doanh nghiệp vận tải nên ưu tiên kiểm soát điểm nào?", "letter": "D", "ans": "Rà soát hợp đồng mẫu, điều khoản bồi thường hoặc giới hạn trách nhiệm, quy trình chứng cứ giao nhận và tuân thủ đúng loại hình vận tải.", "subject": "phapluat", "part": 4}, {"num": 255, "title": "Biện pháp nào giúp doanh nghiệp giảm rủi ro lái xe sử dụng rượu bia hoặc chất kích thích?", "letter": "C", "ans": "Quy chế cấm rõ ràng, kiểm tra định kỳ hoặc đột xuất theo nội quy, kỷ luật minh bạch và đào tạo nhận thức.", "subject": "phapluat", "part": 4}, {"num": 256, "title": "Trong hợp đồng vận chuyển hàng hóa, điều khoản nào giúp giảm rủi ro tranh chấp về mất mát hoặc hao hụt nhất?", "letter": "D", "ans": "Điều khoản về tiêu chuẩn đóng gói, phương thức giao nhận, kiểm đếm, miễn trừ hoặc giới hạn trách nhiệm và thời hạn khiếu nại.", "subject": "phapluat", "part": 4}, {"num": 257, "title": "Khi doanh nghiệp có nhiều bộ phận như điều độ, đội xe, chăm sóc khách hàng, cơ chế nào giảm rủi ro đứt gãy thông tin chuyến tốt nhất?", "letter": "B", "ans": "Quy trình bàn giao ca, mẫu biểu thống nhất, mã chuyến duy nhất và lưu vết cập nhật.", "subject": "phapluat", "part": 4}, {"num": 258, "title": "Khi doanh nghiệp ký hợp đồng vận tải với khách hàng doanh nghiệp, rủi ro pháp lý thường phát sinh nhất ở tình huống nào?", "letter": "C", "ans": "Không thống nhất rõ về điểm giao nhận, thời gian, trách nhiệm bốc xếp và chứng cứ giao nhận.", "subject": "phapluat", "part": 4}, {"num": 259, "title": "Trong quản trị tuân thủ, vì sao cần đào tạo định kỳ cho lái xe về an toàn và quy trình doanh nghiệp?", "letter": "D", "ans": "Để chuẩn hóa hành vi, giảm lỗi lặp lại và tạo chứng cứ rằng doanh nghiệp đã phổ biến quy trình an toàn.", "subject": "phapluat", "part": 4}, {"num": 260, "title": "Trong xử lý khiếu nại khách hàng, nguyên tắc nào đúng để giảm rủi ro tranh chấp leo thang?", "letter": "B", "ans": "Tiếp nhận, xác minh bằng chứng cứ, phản hồi có ghi nhận hoặc bằng văn bản và có thời hạn xử lý rõ ràng.", "subject": "phapluat", "part": 4}, {"num": 261, "title": "Khi doanh nghiệp vận tải thuê thầu phụ như xe hoặc đơn vị khác, yêu cầu nào giúp giảm rủi ro tuân thủ nhất?", "letter": "C", "ans": "Thẩm định điều kiện kinh doanh, bảo hiểm, năng lực lái xe; hợp đồng phải quy định rõ trách nhiệm an toàn, bồi thường và chứng từ.", "subject": "phapluat", "part": 4}, {"num": 262, "title": "Trong quản trị tài chính vận tải, vì sao cần đối soát cước phí theo chuyến như mã chuyến, chứng từ, xác nhận?", "letter": "B", "ans": "Để ngăn gian lận, giảm thất thoát và tạo chứng cứ thanh toán khi có tranh chấp.", "subject": "phapluat", "part": 4}, {"num": 263, "title": "Khi xảy ra tai nạn có thiệt hại tài sản hoặc hàng hóa, doanh nghiệp nên ưu tiên hành động nào để bảo vệ quyền lợi bảo hiểm?", "letter": "D", "ans": "Thông báo đúng quy trình, ghi nhận hiện trường, lập hồ sơ tổn thất và phối hợp giám định.", "subject": "phapluat", "part": 4}, {"num": 264, "title": "Trong hợp đồng vận tải, điều khoản nào giúp giảm rủi ro khách hàng yêu cầu bồi thường vô hạn?", "letter": "D", "ans": "Điều khoản giới hạn trách nhiệm, nguyên tắc xác định thiệt hại và chứng cứ chứng minh thiệt hại.", "subject": "phapluat", "part": 4}, {"num": 265, "title": "Trong quản trị nhân sự, vì sao cần cơ chế thưởng phạt gắn với an toàn?", "letter": "C", "ans": "Để định hướng hành vi của lái xe và điều độ theo hướng an toàn, giảm tái diễn vi phạm.", "subject": "phapluat", "part": 4}, {"num": 266, "title": "Trong kiểm soát phương tiện, sai sót nào có thể làm tăng mạnh rủi ro tai nạn và trách nhiệm của doanh nghiệp?", "letter": "B", "ans": "Bỏ qua bảo dưỡng định kỳ, dùng lốp mòn hoặc phanh kém nhưng vẫn cho xe hoạt động.", "subject": "phapluat", "part": 4}, {"num": 267, "title": "Trong vận chuyển hàng hóa giá trị cao, biện pháp nào giảm rủi ro mất mát hiệu quả nhất?", "letter": "D", "ans": "Quy trình niêm phong và bàn giao, điểm dừng kiểm soát, theo dõi hành trình và quy định không tự ý thay đổi tuyến.", "subject": "phapluat", "part": 4}, {"num": 268, "title": "Vì sao doanh nghiệp vận tải nên có quy trình ứng cứu khẩn cấp như tai nạn, cháy nổ, sự cố hàng nguy hiểm nếu có?", "letter": "C", "ans": "Để phản ứng nhanh, giảm thiệt hại, bảo vệ người và tài sản, đồng thời giảm trách nhiệm pháp lý.", "subject": "phapluat", "part": 4}, {"num": 269, "title": "Trong kiểm soát tuân thủ hợp đồng, vì sao không nên chấp nhận thỏa thuận miệng về thay đổi giá hoặc cước?", "letter": "C", "ans": "Vì để tranh chấp, khó chứng minh và dễ phát sinh yêu cầu bồi thường hoặc khấu trừ không có căn cứ.", "subject": "phapluat", "part": 4}, {"num": 270, "title": "Khi doanh nghiệp vận tải lập bộ quy chế nội bộ như an toàn, điều hành, pháp chế, yêu cầu nào quyết định hiệu lực thực thi?", "letter": "B", "ans": "Phải gắn trách nhiệm cá nhân, có quy trình kiểm tra, xử lý vi phạm, đào tạo phổ biến và lưu vết thực hiện.", "subject": "phapluat", "part": 4}, {"num": 271, "title": "Khi vận chuyển hàng siêu trường, siêu trọng, yêu cầu tuân thủ quan trọng nhất là gì?", "letter": "D", "ans": "Tuân thủ quy định về kích thước, khối lượng, phương án tổ chức giao thông và các thủ tục, điều kiện lưu hành theo quy định.", "subject": "phapluat", "part": 4}, {"num": 272, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, phương án tổ chức giao thông có ý nghĩa chính là gì?", "letter": "B", "ans": "Bảo đảm an toàn tuyến đường, hạn chế ảnh hưởng giao thông và là căn cứ phối hợp, điều tiết trong quá trình vận chuyển.", "subject": "phapluat", "part": 4}, {"num": 273, "title": "Trong quản trị rủi ro vận chuyển hàng siêu trường, siêu trọng, điều cần kiểm soát chặt nhất trước khi xuất phát là gì?", "letter": "C", "ans": "Lộ trình, tuyến đường phù hợp với tải trọng cầu đường, chiều cao tĩnh không, bán kính cua và các công trình hạn chế.", "subject": "phapluat", "part": 4}, {"num": 274, "title": "Trong sơ cứu tai nạn giao thông, nguyên tắc ưu tiên đúng là gì?", "letter": "D", "ans": "Bảo đảm an toàn, gọi cấp cứu, đánh giá đường thở, hô hấp, tuần hoàn, cầm máu và chỉ di chuyển khi thực sự cần thiết.", "subject": "phapluat", "part": 4}, {"num": 275, "title": "Trường hợp nghi ngờ chấn thương cột sống hoặc cổ, thao tác nào là đúng nhất?", "letter": "B", "ans": "Cố định đầu cổ, hạn chế xoay vặn và chỉ di chuyển khi hiện trường không còn an toàn.", "subject": "phapluat", "part": 4}, {"num": 276, "title": "Trong sơ cứu, \"ABC\" được hiểu đúng là gì?", "letter": "C", "ans": "Đường thở, hô hấp, tuần hoàn.", "subject": "phapluat", "part": 4}, {"num": 277, "title": "Trong sơ cứu chảy máu nhiều, xử lý đúng nhất là gì?", "letter": "D", "ans": "Ép trực tiếp lên vết thương, băng ép, nâng cao chi nếu phù hợp và gọi cấp cứu.", "subject": "phapluat", "part": 4}, {"num": 278, "title": "Sai lầm nguy hiểm trong sơ cứu tai nạn giao thông là gì?", "letter": "D", "ans": "Cho nạn nhân ăn hoặc uống khi chưa đánh giá tình trạng và có thể cần can thiệp y tế.", "subject": "phapluat", "part": 4}, {"num": 279, "title": "Đơn vị vận tải hàng nguy hiểm nên chuẩn bị tối thiểu nhóm tài liệu nào?", "letter": "B", "ans": "Hồ sơ hàng hóa nguy hiểm, hướng dẫn an toàn, phương án ứng cứu sự cố, đào tạo liên quan cho lái xe hoặc phụ xe và giấy tờ kèm theo hàng.", "subject": "phapluat", "part": 4}, {"num": 280, "title": "Trong vận tải hàng nguy hiểm, yêu cầu quản trị nào giúp giảm rủi ro lớn nhất khi xảy ra sự cố tràn đổ hoặc rò rỉ?", "letter": "D", "ans": "Có sẵn hướng dẫn xử lý sự cố, trang bị ứng cứu phù hợp và tập huấn cho người thực hiện.", "subject": "phapluat", "part": 4}, {"num": 281, "title": "Khi vận chuyển hàng nguy hiểm, nội dung đào tạo cho lái xe hoặc phụ xe nên ưu tiên nhất là gì?", "letter": "B", "ans": "Nhận diện nguy cơ, xử lý sự cố ban đầu, quy tắc an toàn, liên lạc khẩn cấp và bảo vệ hiện trường.", "subject": "phapluat", "part": 4}, {"num": 282, "title": "Trong vận chuyển hàng nguy hiểm, hành vi nào có thể làm phát sinh trách nhiệm nặng hơn khi xảy ra sự cố?", "letter": "C", "ans": "Che giấu thông tin về loại hàng hoặc không kèm giấy tờ theo quy định.", "subject": "phapluat", "part": 4}, {"num": 283, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, vì sao đúng thời gian hoặc đúng khung giờ đôi khi là yêu cầu bắt buộc?", "letter": "D", "ans": "Để phù hợp tổ chức giao thông, hạn chế ảnh hưởng lưu thông và đáp ứng điều kiện ghi trong chấp thuận hoặc giấy phép.", "subject": "phapluat", "part": 4}, {"num": 284, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, xe hộ tống hoặc xe cảnh báo nếu áp dụng nhằm mục tiêu chính nào?", "letter": "D", "ans": "Cảnh báo sớm, điều tiết tình huống nguy hiểm, bảo đảm khoảng cách và hỗ trợ xử lý tại các điểm hẹp hoặc giao cắt.", "subject": "phapluat", "part": 4}, {"num": 285, "title": "Một dấu hiệu quản trị rủi ro yếu khi vận chuyển hàng siêu trường, siêu trọng là gì?", "letter": "C", "ans": "Không khảo sát tuyến, không đánh giá điểm hạn chế cầu đường mà chỉ chạy theo kinh nghiệm.", "subject": "phapluat", "part": 4}, {"num": 286, "title": "Trong sơ cứu, trường hợp nào cần ưu tiên gọi cấp cứu và theo dõi sát ngay cả khi nạn nhân còn tỉnh?", "letter": "B", "ans": "Có dấu hiệu khó thở, đau ngực, chảy máu nhiều, lơ mơ hoặc nghi chấn thương đầu, cột sống.", "subject": "phapluat", "part": 4}, {"num": 287, "title": "Vì sao cần bảo đảm an toàn hiện trường trước khi sơ cứu?", "letter": "C", "ans": "Vì nếu người cứu cũng gặp nguy hiểm thì sẽ làm tăng số nạn nhân và cản trở cứu hộ.", "subject": "phapluat", "part": 4}, {"num": 288, "title": "Thao tác nào phù hợp để hỗ trợ nạn nhân trong lúc chờ cấp cứu?", "letter": "D", "ans": "Trấn an, giữ ấm, theo dõi ý thức và nhịp thở, hỗ trợ cầm máu đúng cách.", "subject": "phapluat", "part": 4}, {"num": 289, "title": "Trong vận tải hàng nguy hiểm, giấy tờ kèm theo hàng có vai trò chính là gì?", "letter": "C", "ans": "Cung cấp thông tin nguy cơ, hướng dẫn xử lý và là căn cứ chứng minh việc vận chuyển đúng quy định.", "subject": "phapluat", "part": 4}, {"num": 290, "title": "Khi vận chuyển hàng nguy hiểm, nguyên tắc thu thập thông tin tối thiểu cần thiết trong hồ sơ hoặc chứng từ nhằm giảm rủi ro nào?", "letter": "B", "ans": "Rủi ro lộ lọt thông tin nhạy cảm hoặc dữ liệu cá nhân và rủi ro sử dụng dữ liệu sai mục đích.", "subject": "phapluat", "part": 4}, {"num": 291, "title": "Trong vận tải hàng nguy hiểm, quy trình nào giảm rủi ro không truy xuất được trách nhiệm khi sự cố xảy ra?", "letter": "D", "ans": "Biên bản bàn giao, niêm phong nếu áp dụng, nhật ký hành trình, nhật ký xử lý sự cố và lưu vết liên lạc khẩn cấp.", "subject": "phapluat", "part": 4}, {"num": 292, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, rủi ro pháp lý lớn nhất nếu doanh nghiệp tự ý thay đổi tuyến là gì?", "letter": "D", "ans": "Có thể bị xử lý do không tuân thủ điều kiện lưu hành, gây hư hại hạ tầng và phát sinh trách nhiệm bồi thường.", "subject": "phapluat", "part": 4}, {"num": 293, "title": "Trong sơ cứu, dấu hiệu nào gợi ý nạn nhân có thể bị sốc mất máu và cần ưu tiên xử lý?", "letter": "B", "ans": "Da lạnh, vã mồ hôi, mạch nhanh, lơ mơ, khát nhiều.", "subject": "phapluat", "part": 4}, {"num": 294, "title": "Trong sơ cứu, vì sao không nên để nạn nhân bị chấn thương nằm trực tiếp trên nền lạnh?", "letter": "C", "ans": "Vì tăng nguy cơ hạ thân nhiệt, làm nặng thêm tình trạng sốc và tuần hoàn.", "subject": "phapluat", "part": 4}, {"num": 295, "title": "Đối với vận tải hàng nguy hiểm, vì sao doanh nghiệp cần quy trình liên lạc khẩn cấp rõ ràng?", "letter": "B", "ans": "Để kích hoạt ứng cứu kịp thời, phối hợp lực lượng và giảm thiệt hại cũng như trách nhiệm pháp lý.", "subject": "phapluat", "part": 4}, {"num": 296, "title": "Trong quản trị vận chuyển hàng siêu trường, siêu trọng, việc đo kiểm kích thước và khối lượng thực tế trước chuyến nhằm tránh rủi ro nào?", "letter": "B", "ans": "Rủi ro vượt giới hạn cho phép dẫn tới không đủ điều kiện lưu hành, gây hư hại hạ tầng và bị xử lý vi phạm.", "subject": "phapluat", "part": 4}, {"num": 297, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, nội dung nào cần được kiểm tra lại ngay trước giờ xuất phát để giảm rủi ro vi phạm điều kiện lưu hành?", "letter": "D", "ans": "Kiểm tra lại lộ trình được chấp thuận, khung giờ lưu hành, tình trạng kỹ thuật của tổ hợp xe và các điều kiện cảnh báo, hộ tống nếu có.", "subject": "phapluat", "part": 4}, {"num": 298, "title": "Trong vận tải hàng nguy hiểm, hành vi quản trị nào thể hiện tuân thủ tốt nhất?", "letter": "D", "ans": "Có hồ sơ hàng hóa, hướng dẫn an toàn, đào tạo, phương án ứng cứu; kiểm tra trước chuyến và lưu vết việc thực hiện.", "subject": "phapluat", "part": 4}, {"num": 299, "title": "Trong vận chuyển hàng siêu trường, siêu trọng, vì sao doanh nghiệp cần phối hợp trước với đơn vị quản lý đường bộ hoặc cơ quan liên quan nếu thuộc trường hợp phải phối hợp?", "letter": "C", "ans": "Để thống nhất phương án tổ chức giao thông, kiểm soát rủi ro hạ tầng và bảo đảm điều kiện lưu thông hợp pháp.", "subject": "phapluat", "part": 4}, {"num": 300, "title": "Trong sơ cứu, mục tiêu đúng nhất trong 5–10 phút đầu tiên sau tai nạn là gì?", "letter": "B", "ans": "Bảo đảm an toàn hiện trường, gọi cấp cứu, duy trì đường thở – hô hấp – tuần hoàn, cầm máu, giữ ấm và theo dõi diễn biến.", "subject": "phapluat", "part": 4}, {"num": 301, "title": "Theo quy định, bồi thường hàng hóa hư hỏng, mất mát hoặc thiếu hụt trong vận tải hàng hóa được thực hiện chủ yếu theo cơ sở nào?", "letter": "B", "ans": "Theo hợp đồng vận chuyển hoặc theo thỏa thuận giữa người kinh doanh vận tải và người thuê vận tải.", "subject": "phapluat", "part": 4}, {"num": 302, "title": "Nguyên tắc bồi thường thiệt hại ngoài hợp đồng trong tai nạn giao thông thường dựa trên những yếu tố nào?", "letter": "A", "ans": "Có thiệt hại thực tế, có hành vi trái pháp luật, có lỗi hoặc căn cứ chịu trách nhiệm theo luật, và có quan hệ nhân quả giữa hành vi với thiệt hại.", "subject": "phapluat", "part": 4}, {"num": 303, "title": "Trong hợp đồng vận chuyển, điều khoản \"giới hạn trách nhiệm\" có tác dụng gì?", "letter": "D", "ans": "Phân bổ rủi ro và định lượng mức bồi thường tối đa trong phạm vi pháp luật cho phép.", "subject": "phapluat", "part": 4}, {"num": 304, "title": "Trong tranh chấp vận chuyển, nhóm chứng cứ quản trị quan trọng nhất thường gồm những gì?", "letter": "A", "ans": "Hợp đồng hoặc đơn hàng, biên bản giao nhận, chứng từ cước phí, dữ liệu hành trình và tài liệu liên quan đến chuyến vận chuyển.", "subject": "phapluat", "part": 4}, {"num": 305, "title": "Khi hợp đồng vận chuyển không thỏa thuận rõ mức bồi thường hàng hóa, nguyên tắc xử lý pháp lý phù hợp nhất là gì?", "letter": "B", "ans": "Áp dụng quy định chung của pháp luật dân sự về bồi thường thiệt hại và nghĩa vụ chứng minh thiệt hại thực tế.", "subject": "phapluat", "part": 4}, {"num": 306, "title": "\"Thời điểm chuyển giao rủi ro\" trong vận chuyển hàng hóa quan trọng nhất vì lý do nào?", "letter": "C", "ans": "Là mốc xác định bên nào chịu thiệt hại khi hàng hóa bị hư hỏng hoặc mất mát theo từng giai đoạn giao nhận.", "subject": "phapluat", "part": 4}, {"num": 307, "title": "Điều khoản nào giúp khóa rủi ro tranh chấp về tình trạng hàng hóa khi giao nhận?", "letter": "A", "ans": "Quy định bắt buộc lập biên bản giao nhận ghi rõ số lượng, tình trạng, niêm phong và tài liệu chứng minh kèm theo nếu có.", "subject": "phapluat", "part": 4}, {"num": 308, "title": "Trong tai nạn giao thông, trường hợp nào dễ phát sinh trách nhiệm bồi thường theo cơ chế nguồn nguy hiểm cao độ?", "letter": "A", "ans": "Xe cơ giới gây thiệt hại trong quá trình vận hành, trừ trường hợp luật có quy định loại trừ trách nhiệm.", "subject": "phapluat", "part": 4}, {"num": 309, "title": "Điều khoản miễn hoặc giảm trách nhiệm trong hợp đồng vận chuyển thường không có giá trị khi nào?", "letter": "D", "ans": "Khi nhằm loại trừ trách nhiệm đối với hành vi cố ý hoặc vi phạm nghĩa vụ cơ bản một cách nghiêm trọng.", "subject": "phapluat", "part": 4}, {"num": 310, "title": "Trong tranh chấp vận chuyển, tài liệu nào giúp chứng minh nguyên nhân thiệt hại rõ nhất?", "letter": "A", "ans": "Chứng từ giao nhận kết hợp ảnh hiện trạng, dữ liệu hành trình, định vị và nhật ký vận hành theo mốc thời gian.", "subject": "phapluat", "part": 4}, {"num": 311, "title": "Khi bên thuê vận tải khai giá trị hàng hóa cao nhưng không có chứng từ chứng minh, rủi ro pháp lý thường là gì?", "letter": "D", "ans": "Khó chứng minh thiệt hại thực tế, dễ bị giảm mức bồi thường hoặc không được chấp nhận phần yêu cầu vượt quá chứng minh.", "subject": "phapluat", "part": 4}, {"num": 312, "title": "Điều khoản nào nên có để xử lý rủi ro chậm giao hàng trong vận chuyển?", "letter": "A", "ans": "Điều khoản phạt vi phạm hoặc bồi thường do chậm giao, gắn với mốc thời gian thực hiện và các ngoại lệ hợp lý như bất khả kháng.", "subject": "phapluat", "part": 4}, {"num": 313, "title": "Trong vận chuyển hàng hóa, niêm phong hoặc tem, đai kiện nếu áp dụng giúp giảm rủi ro tranh chấp nào?", "letter": "A", "ans": "Tranh chấp về việc hàng bị can thiệp, tráo đổi hoặc thất thoát trong quá trình vận chuyển.", "subject": "phapluat", "part": 4}, {"num": 314, "title": "Trong tai nạn giao thông, quan hệ nhân quả được hiểu đúng nhất là gì?", "letter": "C", "ans": "Thiệt hại phải là hệ quả trực tiếp hoặc tất yếu của hành vi vi phạm hoặc sự kiện gây tai nạn.", "subject": "phapluat", "part": 4}, {"num": 315, "title": "Điều khoản luật áp dụng và giải quyết tranh chấp trong hợp đồng vận chuyển quan trọng nhất vì lý do nào?", "letter": "A", "ans": "Giúp xác định cơ quan giải quyết, thẩm quyền, thủ tục và giảm tranh cãi về con đường pháp lý khi có tranh chấp.", "subject": "phapluat", "part": 4}, {"num": 316, "title": "Trong tranh chấp vận chuyển, loại chứng cứ nào giúp chứng minh đã thông báo rủi ro hoặc chậm trễ cho khách hàng?", "letter": "A", "ans": "Email, tin nhắn hoặc xác nhận điện tử có thời gian, nội dung và người nhận rõ ràng.", "subject": "phapluat", "part": 4}, {"num": 317, "title": "Trong tai nạn giao thông, yếu tố lỗi của người bị thiệt hại có thể dẫn đến hậu quả pháp lý nào?", "letter": "B", "ans": "Có thể làm giảm mức bồi thường tương ứng với mức độ lỗi của người bị thiệt hại.", "subject": "phapluat", "part": 4}, {"num": 318, "title": "Trong vận chuyển hàng hóa, điều khoản nào giúp xử lý rủi ro tổn thất gián tiếp như mất lợi nhuận, chậm sản xuất một cách minh bạch nhất?", "letter": "A", "ans": "Quy định rõ phạm vi bồi thường đối với thiệt hại trực tiếp, gián tiếp, điều kiện chứng minh và giới hạn trách nhiệm.", "subject": "phapluat", "part": 4}, {"num": 319, "title": "Với hàng dễ hư hỏng như thực phẩm, dược phẩm, biện pháp chứng cứ nào tăng sức nặng khi tranh chấp chất lượng?", "letter": "A", "ans": "Biên bản giao nhận kèm điều kiện bảo quản, ảnh niêm phong, dữ liệu thời gian dừng đỗ và thời gian giao hàng.", "subject": "phapluat", "part": 4}, {"num": 320, "title": "Trong trách nhiệm ngoài hợp đồng, thiệt hại thực tế thường bao gồm những gì?", "letter": "B", "ans": "Thiệt hại vật chất và hoặc tổn thất tinh thần tùy trường hợp, nếu được chứng minh theo quy định.", "subject": "phapluat", "part": 4}, {"num": 321, "title": "Trong hợp đồng vận chuyển, vì sao cần có điều khoản về trình tự khiếu nại và thời hạn thông báo tổn thất?", "letter": "B", "ans": "Để chốt mốc thời gian kiểm tra hiện trạng, kịp thời xác minh nguyên nhân và giảm gian lận hoặc khiếu nại bia đặt. C. Không có tác dụng thực tế. D. Chỉ để trang trí hợp đồng.", "subject": "phapluat", "part": 5}, {"num": 322, "title": "Trong tranh chấp vận chuyển, vì sao biên bản hiện trường hoặc biên bản sự cố nên được lập càng sớm càng tốt?", "letter": "B", "ans": "Vì thông tin sự cố còn nguyên vẹn, nhân chứng còn tại chỗ và dữ liệu còn dễ đối chiếu, hạn chế nghi ngờ sửa đổi về sau. C. Vì để đăng mạng xã hội. D. Không cần vì có thể nhớ lại sau.", "subject": "phapluat", "part": 5}, {"num": 323, "title": "Trong tai nạn giao thông, trường hợp nào có thể được xem là sự kiện bất khả kháng ảnh hưởng đến việc đánh giá trách nhiệm?", "letter": "D", "ans": "Thiên tai bất thường, không thể lường trước và không thể khắc phục dù đã áp dụng mọi biện pháp cần thiết.", "subject": "phapluat", "part": 5}, {"num": 324, "title": "Điều khoản về bảo hiểm và quy trình yêu cầu bồi thường bảo hiểm trong hợp đồng vận chuyển giúp gì?", "letter": "B", "ans": "Tổ chức cơ chế chia sẻ rủi ro và quy trình phối hợp hồ sơ khi sự cố xảy ra. C. Không liên quan gì đến tranh chấp. D. Chỉ để quảng bá hình ảnh doanh nghiệp.", "subject": "phapluat", "part": 5}, {"num": 325, "title": "Trong tranh chấp vận chuyển, dữ liệu điện tử có giá trị khi nào?", "letter": "B", "ans": "Có thể xác định được nguồn tạo lập, tính toàn vẹn, thời điểm và mối liên hệ trực tiếp với vụ việc. C. Chỉ cần ảnh chụp màn hình không rõ nguồn. D. Chỉ cần lời kể về dữ liệu đó.", "subject": "phapluat", "part": 5}, {"num": 326, "title": "Trong bồi thường thiệt hại ngoài hợp đồng, nguyên tắc khắc phục toàn bộ và kịp thời được hiểu đúng là gì?", "letter": "B", "ans": "Bồi thường tương xứng với thiệt hại thực tế và thực hiện sớm nhất có thể, các bên có thể thỏa thuận phương thức phù hợp. C. Chỉ bồi thường khi có yêu cầu của công an. D. Chỉ bồi thường nếu có hợp đồng giữa các bên.", "subject": "phapluat", "part": 5}, {"num": 327, "title": "Điều khoản nào giúp kiểm soát rủi ro do bên thứ ba như chủ hàng, người nhận, kho bãi gây ra trong quá trình vận chuyển?", "letter": "A", "ans": "Quy định rõ trách nhiệm phối hợp, thời gian bốc dỡ, điều kiện kho bãi, người ký nhận và trách nhiệm khi chậm hoặc không sẵn sàng nhận hàng. B. Điều khoản màu sơn xe. C. Điều khoản sở thích của lái xe. D. Điều khoản dự báo thời tiết.", "subject": "phapluat", "part": 5}, {"num": 328, "title": "Trong tranh chấp về thiếu hụt số lượng, chứng cứ nào trực tiếp và mạnh nhất?", "letter": "A", "ans": "Phiếu cân, biên bản cân, chứng từ xuất nhập kho, biên bản giao nhận có ký nhận và niêm phong nếu có. B. Ảnh tự chụp của lái xe. C. Bình luận trên mạng xã hội. D. Tờ rơi quảng cáo.", "subject": "phapluat", "part": 5}, {"num": 329, "title": "Trong tai nạn giao thông, để yêu cầu bồi thường các chi phí hợp lý, người bị thiệt hại nên chuẩn bị gì?", "letter": "D", "ans": "Hóa đơn, chứng từ, hồ sơ y tế, tài liệu về thu nhập bị mất hoặc giảm và các tài liệu liên quan trực tiếp đến thiệt hại.", "subject": "phapluat", "part": 5}, {"num": 330, "title": "Trong hợp đồng vận chuyển, điều khoản nào giúp giảm rủi ro tranh chấp nhất khi xảy ra sự cố bất thường như tai nạn, kẹt xe dài, cấm đường?", "letter": "A", "ans": "Điều khoản quy định quy trình thông báo sự cố, nghĩa vụ giảm thiểu thiệt hại, phương án xử lý thay thế và lưu vết xác nhận của khách hàng. B. Điều khoản màu sơn xe. C. Điều khoản sở thích của lái xe. D. Điều khoản dự báo thời tiết chung chung.", "subject": "phapluat", "part": 5}, {"num": 331, "title": "Khi bị kiểm tra trên đường, bộ hồ sơ tối thiểu trên xe đối với hoạt động kinh doanh vận tải thường cần có gì?", "letter": "A", "ans": "Giấy tờ xe, phù hiệu hoặc biển hiệu theo loại hình nếu thuộc diện bắt buộc, giấy tờ lái xe và giấy tờ của chuyến đi phù hợp với loại hình khai thác. B. Chỉ cần căn cước công dân. C. Chỉ cần thẻ nhân viên. D. Không cần giấy tờ gì.", "subject": "phapluat", "part": 5}, {"num": 332, "title": "Nguyên tắc làm việc với đoàn thanh tra hoặc kiểm tra để giảm rủi ro pháp lý là gì?", "letter": "B", "ans": "Hợp tác, cung cấp hồ sơ theo yêu cầu hợp pháp, lập biên bản rõ ràng và bảo lưu ý kiến bằng văn bản khi cần. C. Từ chối mọi yêu cầu. D. Bỏ đi không làm việc.", "subject": "phapluat", "part": 5}, {"num": 333, "title": "Nếu doanh nghiệp phát hiện quy trình nội bộ dẫn sai căn cứ pháp lý đã bị sửa đổi hoặc thay thế, cách xử lý đúng nhất là gì?", "letter": "B", "ans": "Ban hành bản cập nhật, ghi rõ nội dung thay thế, thời điểm hiệu lực và đào tạo lại người liên quan. C. Chỉ nhắc miệng nội bộ. D. Xóa toàn bộ tài liệu cũ mà không để lại dấu vết cập nhật.", "subject": "phapluat", "part": 5}, {"num": 334, "title": "Khi lực lượng chức năng kiểm tra, loại giấy tờ nào thường dễ bị thiếu nhất và gây rủi ro bị xử phạt đối với xe kinh doanh vận tải?", "letter": "D", "ans": "Giấy tờ của chuyến đi theo loại hình như hợp đồng, lệnh vận chuyển, danh sách hành khách, đơn hàng hoặc chứng từ tương ứng.", "subject": "phapluat", "part": 5}, {"num": 335, "title": "Khi kiểm tra trên đường, cách ứng xử nào giúp giảm rủi ro phát sinh tình tiết bất lợi trong hồ sơ xử phạt?", "letter": "B", "ans": "Trình bày ngắn gọn, xuất trình giấy tờ, yêu cầu ghi nhận đầy đủ ý kiến vào biên bản nếu có điểm chưa thống nhất. C. Quay clip và xúc phạm cán bộ làm nhiệm vụ. D. Bỏ đi để tránh làm việc.", "subject": "phapluat", "part": 5}, {"num": 336, "title": "Trong quản trị tuân thủ, vì sao cần quản lý phiên bản đối với quy trình và biểu mẫu?", "letter": "B", "ans": "Để truy vết ai ban hành, thay đổi gì, hiệu lực từ khi nào và tránh dùng tài liệu lỗi thời gây sai phạm. C. Vì ai cũng thích đổi mẫu liên tục. D. Không cần quản lý phiên bản.", "subject": "phapluat", "part": 5}, {"num": 337, "title": "Tại thời điểm kiểm tra, doanh nghiệp hoặc lái xe có quyền đề nghị gì để bảo đảm tính minh bạch?", "letter": "B", "ans": "Đề nghị cán bộ lập biên bản ghi đầy đủ hiện trạng, tài liệu đã xuất trình và ý kiến giải trình hoặc bảo lưu của người bị kiểm tra. C. Yêu cầu bỏ qua lỗi vi phạm. D. Đề nghị xé biên bản ngay tại chỗ.", "subject": "phapluat", "part": 5}, {"num": 338, "title": "Checklist hồ sơ trên xe nên được chuẩn hóa theo nguyên tắc nào?", "letter": "B", "ans": "Phân nhóm theo loại hình vận tải và tình huống chuyến đi, có người chịu trách nhiệm kiểm tra trước chuyến. C. Chỉ giao cho lái xe tự nhớ. D. Chỉ kiểm tra khi có thanh tra hoặc kiểm tra định kỳ.", "subject": "phapluat", "part": 5}, {"num": 339, "title": "Nếu phát hiện biểu mẫu đang viện dẫn văn bản đã bị thay thế, bước nào cần ưu tiên thực hiện trước?", "letter": "D", "ans": "Ban hành thông báo tạm dừng áp dụng mẫu cũ, chỉ định mẫu mới hoặc nội dung thay thế, sau đó cập nhật chính thức.", "subject": "phapluat", "part": 5}, {"num": 340, "title": "Khi làm việc với đoàn thanh tra hoặc kiểm tra, nguyên tắc nào giúp tránh rủi ro cung cấp sai, thừa hoặc thiếu hồ sơ?", "letter": "B", "ans": "Cung cấp đúng phạm vi yêu cầu hợp pháp, lập bảng kê tài liệu giao nộp hoặc xuất trình và yêu cầu ký xác nhận. C. Không cung cấp bất kỳ tài liệu nào. D. Chỉ trình bày miệng, không giao giấy tờ.", "subject": "phapluat", "part": 5}, {"num": 341, "title": "Trong thực tế kiểm tra, lỗi nào dễ bị đánh giá là không chứng minh được điều kiện kinh doanh?", "letter": "B", "ans": "Không có hoặc không đúng phù hiệu, biển hiệu theo loại hình nếu thuộc diện bắt buộc, hoặc không xuất trình được giấy tờ của chuyến đi. C. Lái xe không đeo đồng hồ. D. Không dán quảng cáo.", "subject": "phapluat", "part": 5}, {"num": 342, "title": "Doanh nghiệp nên lưu trữ hồ sơ kiểm tra hoặc biên bản làm việc theo cách nào để thuận lợi cho việc giải trình?", "letter": "B", "ans": "Lưu theo hồ sơ vụ việc, gồm biên bản, tài liệu xuất trình, ảnh hoặc chứng cứ kèm theo, văn bản giải trình và quyết định xử lý nếu có. C. Không cần lưu hồ sơ. D. Chỉ lưu riêng quyết định xử phạt.", "subject": "phapluat", "part": 5}, {"num": 343, "title": "Khi bị lập biên bản vi phạm hành chính, nội dung nào bắt buộc phải kiểm tra kỹ trước khi ký?", "letter": "B", "ans": "Thời gian, địa điểm, mô tả cụ thể hành vi vi phạm, ý kiến người vi phạm, tài liệu kèm theo và các thông tin liên quan của biên bản. C. Không cần đọc mà ký luôn. D. Chỉ cần ký cho xong việc.", "subject": "phapluat", "part": 5}, {"num": 344, "title": "Doanh nghiệp nên thiết lập cơ chế tự kiểm tra tuân thủ với tần suất nào là hợp lý?", "letter": "B", "ans": "Định kỳ theo tháng hoặc quý, đồng thời kiểm tra đột xuất theo mức độ rủi ro. C. Năm năm một lần. D. Không cần kiểm tra nội bộ.", "subject": "phapluat", "part": 5}, {"num": 345, "title": "Nếu cán bộ yêu cầu cung cấp tài liệu ngoài phạm vi thẩm quyền hoặc không có căn cứ rõ ràng, cách xử lý phù hợp nhất là gì?", "letter": "D", "ans": "Đề nghị nêu rõ căn cứ pháp lý và phạm vi yêu cầu, ghi nhận ý kiến vào biên bản và chỉ cung cấp sau khi xác định yêu cầu hợp pháp.", "subject": "phapluat", "part": 5}, {"num": 346, "title": "Trong vận tải hàng hóa, giấy tờ chuyến nào có giá trị chứng minh quan hệ vận chuyển mạnh nhất khi có tranh chấp?", "letter": "B", "ans": "Đơn hàng, lệnh vận chuyển hoặc hợp đồng vận chuyển kèm biên bản giao nhận có ký xác nhận. C. Bình luận trên mạng xã hội. D. Ảnh tự chụp của lái xe.", "subject": "phapluat", "part": 5}, {"num": 347, "title": "Quy định nội bộ về bảo lưu ý kiến khi ký biên bản nên hướng dẫn như thế nào?", "letter": "B", "ans": "Viết ngắn gọn, đúng trọng tâm, nêu rõ điểm không đồng ý và đề nghị ghi nhận tài liệu hoặc chứng cứ kèm theo. C. Viết thật dài để gây khó hiểu. D. Không cần ghi gì cả.", "subject": "phapluat", "part": 5}, {"num": 348, "title": "Khi cập nhật quy trình nội bộ, vì sao cần đào tạo lại thay vì chỉ gửi email thông báo?", "letter": "B", "ans": "Vì tuân thủ phụ thuộc vào hành vi thực hiện; đào tạo giúp thống nhất cách hiểu, thống nhất thao tác và giảm lỗi tái diễn. C. Vì email không bao giờ gửi được. D. Không cần đào tạo lại.", "subject": "phapluat", "part": 5}, {"num": 349, "title": "Trên xe kinh doanh vận tải, việc lưu bản điện tử trên ứng dụng hoặc điện thoại thay cho bản giấy cần lưu ý gì?", "letter": "B", "ans": "Phải bảo đảm có thể xuất trình ngay khi kiểm tra, thông tin đầy đủ, truy xuất được đúng chuyến và phù hợp với quy định của từng loại giấy tờ. C. Chỉ cần chụp ảnh mờ là đủ. D. Không cần gì vì có thể nói miệng.", "subject": "phapluat", "part": 5}, {"num": 350, "title": "Với đoàn kiểm tra, cách ghi nhận việc giao nộp hồ sơ đúng nhất là gì?", "letter": "D", "ans": "Có phiếu hoặc bảng kê, nêu số lượng trang, bản sao hay bản chính, thời điểm giao nhận và chữ ký của hai bên.", "subject": "phapluat", "part": 5}, {"num": 351, "title": "Trong kiểm soát nội bộ, ai nên chịu trách nhiệm cuối cùng về tính đầy đủ của hồ sơ trên xe?", "letter": "B", "ans": "Doanh nghiệp phải phân công rõ: bộ phận điều hành hoặc đội trưởng kiểm tra trước chuyến, còn lái xe chịu trách nhiệm mang theo và xuất trình khi bị kiểm tra. C. Không ai chịu trách nhiệm. D. Khách hàng chịu trách nhiệm.", "subject": "phapluat", "part": 5}, {"num": 352, "title": "Khi doanh nghiệp bị xử phạt, việc khắc phục hậu quả có ý nghĩa gì?", "letter": "B", "ans": "Giúp chấm dứt vi phạm, giảm nguy cơ tái phạm và thể hiện việc chấp hành, dù đương nhiên thay thế tiền phạt. C. Thay thế hoàn toàn tiền phạt. D. Chỉ làm cho có hình thức.", "subject": "phapluat", "part": 5}, {"num": 353, "title": "Khi doanh nghiệp muốn khiếu nại quyết định xử phạt, nguyên tắc quan trọng nhất là gì?", "letter": "B", "ans": "Khiếu nại đúng thời hạn, đúng thẩm quyền, kèm chứng cứ và lập luận dựa trên hồ sơ, biên bản, tài liệu có thật. C. Chỉ gọi điện thoại trao đổi miệng. D. Đăng mạng xã hội để tạo áp lực.", "subject": "phapluat", "part": 5}, {"num": 354, "title": "Vì sao doanh nghiệp nên có sổ tay tuân thủ cho lái xe?", "letter": "B", "ans": "Vì lái xe là người trực tiếp bị kiểm tra, nên sổ tay giúp thống nhất cách xuất trình hồ sơ, ứng xử, ghi nhận biên bản và checklist giấy tờ. C. Chỉ để quảng cáo nội bộ. D. Không cần vì đã có nội quy dài.", "subject": "phapluat", "part": 5}, {"num": 355, "title": "Trong trường hợp xe chạy sai tuyến hoặc không đúng phạm vi được phép nếu có giới hạn, rủi ro chính là gì?", "letter": "B", "ans": "Bị đánh giá hoạt động không đúng điều kiện, có thể bị xử phạt và bị yêu cầu khắc phục. C. Được ưu tiên qua trạm. D. Được giảm phí đường bộ.", "subject": "phapluat", "part": 5}, {"num": 356, "title": "Khi bị kiểm tra, vì sao không nên tự nhận lỗi bằng lời nói nếu chưa xác định rõ hành vi và căn cứ pháp lý?", "letter": "D", "ans": "Vì lời nói có thể bị ghi nhận thành tình tiết bất lợi; cần đối chiếu hành vi, căn cứ và chứng cứ trước khi thừa nhận nội dung vi phạm.", "subject": "phapluat", "part": 5}, {"num": 357, "title": "Với quy trình nội bộ, tiêu chí nào cho thấy căn cứ pháp lý đã lỗi thời?", "letter": "B", "ans": "Trích dẫn số hiệu văn bản đã hết hiệu lực, đã bị thay thế hoặc nội dung viện dẫn không còn phù hợp với quy định hiện hành. C. Font chữ khác nhau. D. Thiếu dấu chấm câu.", "subject": "phapluat", "part": 5}, {"num": 358, "title": "Trong mô hình quản trị tuân thủ, điểm dừng bắt buộc trước khi xe xuất bến nên bao gồm nội dung nào?", "letter": "B", "ans": "Kiểm tra giấy tờ của chuyến, tình trạng an toàn cơ bản của xe, phân công người kiểm tra và ký xác nhận trước khi xe xuất phát. C. Chỉ kiểm tra điện thoại lái xe. D. Không cần điểm dừng bắt buộc.", "subject": "phapluat", "part": 5}, {"num": 359, "title": "Khi làm việc với đoàn kiểm tra, vì sao cần người đại diện doanh nghiệp hoặc đầu mối pháp chế tham gia nếu có điều kiện?", "letter": "B", "ans": "Để thống nhất phát ngôn, kiểm soát hồ sơ cung cấp và xử lý việc giải trình hoặc bảo lưu đúng kỹ thuật pháp lý. C. Để cãi nhau thay lái xe. D. Không cần vì ai làm việc cũng được.", "subject": "phapluat", "part": 5}, {"num": 360, "title": "Sau một đợt kiểm tra hoặc bị xử phạt, hành động đóng vòng cải tiến đúng nhất là gì?", "letter": "B", "ans": "Họp rút kinh nghiệm, xác định nguyên nhân gốc, cập nhật checklist hoặc quy trình và kiểm tra lại sau một thời gian ngắn. C. Đổ lỗi cho lái xe là xong. D. Chỉ đăng nội quy lên tường.", "subject": "phapluat", "part": 5}, {"num": 361, "title": "Đối với dịch vụ vận tải, bộ chứng từ nào phù hợp nhất để ghi nhận doanh thu đúng quy định?", "letter": "A", "ans": "Hợp đồng hoặc đơn hàng, biên bản giao nhận hoặc nghiệm thu và hóa đơn điện tử. B. Chỉ cần phiếu thu viết tay. C. Chỉ cần tin nhắn miệng. D. Không cần chứng từ gì.", "subject": "phapluat", "part": 5}, {"num": 362, "title": "Sau khi đã lập hóa đơn, nếu phát sinh điều chỉnh tăng hoặc giảm cước vận chuyển, cách xử lý đúng là gì?", "letter": "B", "ans": "Lập biên bản hoặc thỏa thuận điều chỉnh và lập hóa đơn điều chỉnh theo quy định. C. Xóa hóa đơn cũ rồi làm lại như chưa phát sinh. D. Không cần xử lý gì thêm.", "subject": "phapluat", "part": 5}, {"num": 363, "title": "Để quản trị khoản thu hộ hoặc chi hộ như phí cầu đường, bốc xếp, doanh nghiệp nên áp dụng nguyên tắc nào?", "letter": "C", "ans": "Tách riêng khoản thu hộ, chi hộ và lưu chứng từ kèm theo. D. Để lái xe tự quyết định ghi nhận thế nào cũng được.", "subject": "phapluat", "part": 5}, {"num": 364, "title": "Việc đối chiếu công nợ định kỳ giữa doanh nghiệp vận tải và khách hàng giúp phòng ngừa rủi ro nào?", "letter": "A", "ans": "Sai lệch số dư công nợ và tranh chấp thanh toán. B. Rủi ro giao thông. C. Rủi ro tắc đường. D. Không có rủi ro gì cần phòng ngừa.", "subject": "phapluat", "part": 5}, {"num": 365, "title": "Nếu lái xe trực tiếp thu tiền mặt của khách hàng, rủi ro kiểm soát nội bộ lớn nhất là gì?", "letter": "A", "ans": "Rủi ro thất thoát tiền hoặc chiếm dụng tiền thu được. B. Rủi ro tắc đường. C. Rủi ro mất điện thoại. D. Không có rủi ro gì đáng kể.", "subject": "phapluat", "part": 5}, {"num": 366, "title": "Để kiểm soát chi phí nhiên liệu trong vận tải, doanh nghiệp nên áp dụng nguyên tắc nào?", "letter": "C", "ans": "Kết hợp hóa đơn hợp lệ với định mức tiêu hao và dữ liệu hành trình hoặc hoạt động xe. D. Chỉ cần ảnh chụp cây xăng.", "subject": "phapluat", "part": 5}, {"num": 367, "title": "Đơn hàng hoặc hợp đồng điện tử có thể làm căn cứ xuất hóa đơn vận tải hay không?", "letter": "D", "ans": "Có, nếu đáp ứng điều kiện của giao dịch điện tử và có thể truy xuất, xác thực được.", "subject": "phapluat", "part": 5}, {"num": 368, "title": "Trong doanh nghiệp vận tải, việc lưu trữ dữ liệu chuyến xe như lộ trình, thời gian, điểm giao nhận có ý nghĩa gì?", "letter": "B", "ans": "Là chứng cứ để xác nhận việc thực hiện dịch vụ vận tải. C. Chỉ dùng cho thống kê nội bộ, không liên quan tranh chấp. D. Không cần lưu trữ.", "subject": "phapluat", "part": 5}, {"num": 369, "title": "Khi hạch toán khoản bồi thường hàng hóa trong vận tải, hồ sơ tối thiểu cần có là gì?", "letter": "C", "ans": "Biên bản xác nhận thiệt hại, chứng cứ giao nhận, thỏa thuận bồi thường và chứng từ chi trả. D. Chỉ ghi vào sổ tay cá nhân.", "subject": "phapluat", "part": 5}, {"num": 370, "title": "Dữ liệu nào của phần mềm điều hành giúp cơ quan thuế hoặc kiểm toán đối chiếu doanh thu hiệu quả nhất?", "letter": "B", "ans": "Dữ liệu chuyến như đơn hàng, điểm đón trả, quãng đường, cước và trạng thái hoàn thành. C. Dữ liệu trò chuyện vui trong nội bộ. D. Không có dữ liệu nào liên quan.", "subject": "phapluat", "part": 5}, {"num": 371, "title": "Doanh nghiệp vận tải có bãi xe hoặc kho, nghĩa vụ phòng cháy chữa cháy trọng tâm nhất là gì?", "letter": "D", "ans": "Duy trì điều kiện an toàn phòng cháy chữa cháy, phân công phụ trách và kiểm tra định kỳ.", "subject": "phapluat", "part": 5}, {"num": 372, "title": "Khi nạp nhiên liệu hoặc sạc điện tại bãi, rủi ro phòng cháy chữa cháy cần kiểm soát ưu tiên là gì?", "letter": "B", "ans": "Kiểm soát nguồn lửa, nguồn nhiệt, khu vực nguy hiểm và phương án xử lý sự cố. C. Chỉ cần thao tác nhanh. D. Chỉ cần mua bảo hiểm.", "subject": "phapluat", "part": 5}, {"num": 373, "title": "Tài liệu tối thiểu tại bãi xe để chứng minh đã tổ chức phòng cháy chữa cháy là gì?", "letter": "C", "ans": "Biên bản kiểm tra, danh mục và vị trí phương tiện phòng cháy chữa cháy, phương án hoặc diễn tập và danh sách huấn luyện liên quan. D. Không cần tài liệu gì.", "subject": "phapluat", "part": 5}, {"num": 374, "title": "Huấn luyện phòng cháy chữa cháy định kỳ cho nhân viên có ý nghĩa pháp lý nào?", "letter": "B", "ans": "Thể hiện doanh nghiệp đã thực hiện biện pháp phòng ngừa và giảm rủi ro bị đánh giá là buông lỏng tổ chức an toàn. C. Chỉ để đối phó khi bị kiểm tra. D. Chỉ để làm đẹp hình thức hồ sơ.", "subject": "phapluat", "part": 5}, {"num": 375, "title": "Khi xảy ra cháy, hồ sơ hiện trường ban đầu giúp gì cho doanh nghiệp?", "letter": "D", "ans": "Giúp xác định nguyên nhân sơ bộ, thiệt hại và là căn cứ làm việc với cơ quan chức năng hoặc doanh nghiệp bảo hiểm.", "subject": "phapluat", "part": 5}, {"num": 376, "title": "Lối thoát nạn tại kho hoặc bãi có ý nghĩa gì trong quản trị rủi ro?", "letter": "C", "ans": "Là yếu tố quyết định khả năng thoát nạn an toàn khi xảy ra cháy nổ. D. Chỉ để vận chuyển hàng nhanh hơn.", "subject": "phapluat", "part": 5}, {"num": 377, "title": "Khi thuê kho hoặc bãi của bên thứ ba, hợp đồng nên ràng buộc gì về phòng cháy chữa cháy?", "letter": "B", "ans": "Quy định rõ trách nhiệm phòng cháy chữa cháy, bàn giao hồ sơ liên quan, quyền kiểm tra và cơ chế xử lý vi phạm. C. Chỉ cần có chỗ đỗ xe. D. Không cần hợp đồng.", "subject": "phapluat", "part": 5}, {"num": 378, "title": "Nếu thiết bị phòng cháy chữa cháy hết hạn hoặc không hoạt động, cách xử lý đúng là gì?", "letter": "B", "ans": "Thay thế hoặc sửa chữa ngay, lập biên bản và cập nhật vào checklist kiểm tra. C. Dán băng dính tạm cho xong. D. Chờ đến khi có cháy mới xử lý.", "subject": "phapluat", "part": 5}, {"num": 379, "title": "Nội quy và sơ đồ thoát nạn treo tại kho hoặc bãi có tác dụng gì?", "letter": "B", "ans": "Hướng dẫn hành vi đúng, hỗ trợ tuân thủ và là căn cứ để nhắc nhở, kiểm tra hoặc xử lý nội bộ. C. Không có tác dụng. D. Thay thế hoàn toàn việc huấn luyện.", "subject": "phapluat", "part": 5}, {"num": 380, "title": "Đối với vận tải hàng nguy hiểm, yêu cầu phòng cháy chữa cháy bổ sung cần chú trọng nhất ở khâu nào?", "letter": "B", "ans": "Khâu xếp dỡ, phân khu cách ly và trang bị phương tiện phòng cháy chữa cháy phù hợp với tính chất hàng. C. Chỉ khâu marketing. D. Không cần yêu cầu bổ sung gì.", "subject": "phapluat", "part": 5}, {"num": 381, "title": "Dầu nhớt thải và giẻ lau dính dầu trong bảo dưỡng xe thường được quản lý theo nhóm nào?", "letter": "D", "ans": "Chất thải nguy hại.", "subject": "phapluat", "part": 5}, {"num": 382, "title": "Vì sao doanh nghiệp vận tải cần theo dõi bảo dưỡng và kiểm soát khí thải phương tiện?", "letter": "B", "ans": "Giảm rủi ro bị xử phạt và giảm nguy cơ sự cố kỹ thuật liên quan đến an toàn vận hành. C. Không liên quan gì đến hoạt động doanh nghiệp. D. Chỉ để quảng cáo là doanh nghiệp xanh.", "subject": "phapluat", "part": 5}, {"num": 383, "title": "Nước thải rửa xe cần được quản trị tối thiểu theo nguyên tắc nào?", "letter": "B", "ans": "Thu gom và thoát nước phù hợp, hạn chế dầu mỡ và không xả thải trái quy định. C. Chỉ cần rửa ít nước. D. Không cần quản lý vì lượng thải nhỏ.", "subject": "phapluat", "part": 5}, {"num": 384, "title": "Hợp đồng thuê bãi xe hoặc kho nên có điều khoản môi trường nào là quan trọng?", "letter": "B", "ans": "Quy định trách nhiệm xử lý chất thải, nước thải và cơ chế bồi thường, khắc phục khi vi phạm. C. Chỉ cần giá thuê rẻ. D. Chỉ cần quy định thời hạn thuê.", "subject": "phapluat", "part": 5}, {"num": 385, "title": "Khi xảy ra sự cố tràn dầu tại bãi hoặc kho, ưu tiên xử lý đúng là gì?", "letter": "B", "ans": "Khoanh vùng, ngăn lan, thông báo người có trách nhiệm, thu gom xử lý an toàn và lập biên bản sự cố. C. Đổ thêm nước cho loãng rồi để trôi đi. D. Chụp ảnh đăng mạng xã hội trước.", "subject": "phapluat", "part": 5}, {"num": 386, "title": "Đào tạo nội bộ về phân loại chất thải giúp giảm rủi ro nào?", "letter": "D", "ans": "Giảm vi phạm do thiếu hiểu biết và giúp phòng ngừa sự cố môi trường.", "subject": "phapluat", "part": 5}, {"num": 387, "title": "Khi ký hợp đồng thu gom chất thải, doanh nghiệp cần kiểm tra tối thiểu điều gì?", "letter": "B", "ans": "Đơn vị thu gom có chức năng phù hợp, có hợp đồng rõ ràng và có chứng từ bàn giao chất thải. C. Chỉ cần quen biết. D. Không cần chứng từ gì.", "subject": "phapluat", "part": 5}, {"num": 388, "title": "Tiếng ồn và khói bụi từ bốc xếp tại kho hoặc bãi liên quan đến rủi ro nào?", "letter": "B", "ans": "Rủi ro bị phản ánh, bị kiểm tra và bị xử phạt hành chính về môi trường. C. Chỉ làm giảm doanh thu. D. Chỉ gây mất điện thoại.", "subject": "phapluat", "part": 5}, {"num": 389, "title": "Có nên lập sổ theo dõi chất thải nguy hại không, và vì sao?", "letter": "B", "ans": "Nên lập để kiểm soát lượng phát sinh, thời điểm bàn giao và chứng minh việc tuân thủ trong quá trình quản lý. C. Chỉ lập khi đã bị phạt. D. Chỉ lập khi có tai nạn môi trường.", "subject": "phapluat", "part": 5}, {"num": 390, "title": "Tiêu chí nào giúp doanh nghiệp giảm rủi ro khi cộng đồng phản ánh về ô nhiễm?", "letter": "B", "ans": "Có kênh tiếp nhận và xử lý phản ánh cùng với hồ sơ kiểm soát môi trường tại kho, bãi. C. Không cần phản hồi gì. D. Đổ lỗi cho người dân phản ánh.", "subject": "phapluat", "part": 5}, {"num": 391, "title": "Dữ liệu điện tử có giá trị chứng cứ tốt hơn khi đáp ứng điều kiện nào?", "letter": "D", "ans": "Có cơ chế xác thực nguồn gốc, tính toàn vẹn và xác định được chủ thể tạo lập.", "subject": "phapluat", "part": 5}, {"num": 392, "title": "Chữ ký số hoặc chữ ký điện tử trong hợp đồng vận tải giúp mang lại lợi ích pháp lý nào rõ nhất?", "letter": "B", "ans": "Xác thực chủ thể ký và giảm rủi ro bị phủ nhận việc giao kết. C. Không có lợi ích pháp lý nào. D. Thay thế toàn bộ giấy tờ của phương tiện.", "subject": "phapluat", "part": 5}, {"num": 393, "title": "Ghi âm cuộc gọi đặt chuyến để làm chứng cứ cần tuân thủ nguyên tắc nào?", "letter": "B", "ans": "Có mục đích rõ ràng, thu thập ở mức cần thiết và bảo vệ dữ liệu cá nhân trong quá trình lưu trữ, sử dụng. C. Bán file ghi âm cho bên khác. D. Đăng công khai lên mạng xã hội.", "subject": "phapluat", "part": 5}, {"num": 394, "title": "Khi lưu trữ dữ liệu hành trình, yếu tố nào giúp giảm nghi ngờ dữ liệu bị chỉnh sửa?", "letter": "B", "ans": "Có nhật ký truy cập, phân quyền, dấu thời gian và cơ chế kiểm tra tính toàn vẹn của dữ liệu. C. Chỉ lưu bằng tệp bảng tính đơn giản. D. Xóa dữ liệu cũ thường xuyên không để lại dấu vết.", "subject": "phapluat", "part": 5}, {"num": 395, "title": "Email, tin nhắn ứng dụng hoặc hệ thống đặt chuyến có thể là chứng cứ hay không, và điều kiện quan trọng là gì?", "letter": "B", "ans": "Có thể là chứng cứ nếu chứng minh được nguồn gốc, chủ thể, tính toàn vẹn và sự liên quan đến vụ việc. C. Chỉ khi được công chứng. D. Chỉ khi được in ra giấy.", "subject": "phapluat", "part": 5}, {"num": 396, "title": "Vì sao doanh nghiệp cần chính sách sao lưu dữ liệu điều hành vận tải?", "letter": "D", "ans": "Để bảo đảm khả năng khôi phục khi có lỗi hoặc tấn công, duy trì chứng cứ và bảo đảm hoạt động liên tục.", "subject": "phapluat", "part": 5}, {"num": 397, "title": "Khi lưu trữ dữ liệu điều hành vận tải, doanh nghiệp nên áp dụng nguyên tắc nào để bảo đảm khả năng truy vết trách nhiệm?", "letter": "B", "ans": "Thiết lập phân quyền truy cập, ghi nhận lịch sử thao tác và xác định người chịu trách nhiệm đối với từng nhóm dữ liệu. C. Không cần lưu lịch sử truy cập. D. Xóa dữ liệu ngay sau khi sử dụng xong.", "subject": "phapluat", "part": 5}, {"num": 398, "title": "Hợp đồng điện tử nên có điều khoản nào để xử lý trường hợp hệ thống bị lỗi?", "letter": "B", "ans": "Cơ chế xác nhận thay thế như email hoặc tin nhắn, thời điểm ghi nhận giao dịch và trách nhiệm thông báo khi hệ thống gặp sự cố. C. Đổ lỗi mặc định cho khách hàng. D. Hủy mọi giao dịch phát sinh trong mọi trường hợp.", "subject": "phapluat", "part": 5}, {"num": 399, "title": "Nếu khách hàng phủ nhận việc đã đặt chuyến, nhóm chứng cứ nào thường mạnh nhất?", "letter": "B", "ans": "Chuỗi dữ liệu gồm log hệ thống, định danh tài khoản, bước xác thực như mã OTP và lịch sử thanh toán hoặc hoàn thành chuyến. C. Ảnh phong cảnh không liên quan. D. Không có loại chứng cứ nào đáng kể.", "subject": "phapluat", "part": 5}, {"num": 400, "title": "Phân quyền truy cập dữ liệu điều hành giúp phòng ngừa rủi ro nào?", "letter": "D", "ans": "Rò rỉ dữ liệu, lạm quyền, sửa hoặc xóa trái phép và khó truy trách nhiệm khi có sự cố.", "subject": "phapluat", "part": 5}];

ng (VA) tính theo phương pháp phân phối:", "letter": "", "ans": "VA = Thu nhập lần đầu của người sản xuất + Thu nhập lần đầu của doanh nghiệp + Khấu hao TSĐ", "subject": "thongke", "part": 0}, {"num": 101, "title": "Chi phí nào sau đây là chi phí dịch vụ:", "letter": "", "ans": "Chi phí tuyên truyền, quảng cáo", "subject": "thongke", "part": 0}, {"num": 102, "title": "Chi phí nào sau đây là chi phí vật chất:", "letter": "", "ans": "Chi mua vật rẻ tiền mau hỏng được phân bổ trong năm", "subject": "thongke", "part": 0}, {"num": 103, "title": "Tiền công tác phí bao gồm: tiền vé tàu, tiền trả khách sạn, nhà trọ được tính vào:", "letter": "", "ans": "Chi phí dịch vụ", "subject": "thongke", "part": 0}, {"num": 104, "title": "Tìm câu sai trong các câu sau. Khi tính giá trị gia tăng:", "letter": "", "ans": "Được tính toàn bộ giá trị sản xuất tạo ra trong một kỳ nhất định, bao gồm: c + v + m", "subject": "thongke", "part": 0}, {"num": 105, "title": "Giá trị sản xuất ngành giao thông vận tải, kho bãi gồm:", "letter": "", "ans": "5 nội dung", "subject": "thongke", "part": 0}, {"num": 106, "title": "Chi phí trung gian (IC) dùng để tính giá trị gia tăng (VA) của doanh nghiệp, gồm:", "letter": "", "ans": "Toàn bộ các khoản chi phí vật chất và dịch vụ", "subject": "thongke", "part": 0}, {"num": 107, "title": "Khi phân tích sự biến động của doanh thu theo các nhân tố chính trong kết quả sản xuất kinh doanh của doanh nghiệp, có:", "letter": "", "ans": "5 yếu tố", "subject": "thongke", "part": 0}, {"num": 108, "title": "Khi đánh giá mức độ hoàn thành kế hoạch mặt hàng của doanh nghiệp cần dựa trên nguyên tắc:", "letter": "", "ans": "Không lấy mặt hàng vượt kế hoạch bù cho mặt hàng không hoàn thành kế hoạch", "subject": "thongke", "part": 0}, {"num": 109, "title": "Phương pháp tính khối lượng sản phẩm vật chất của doanh nghiệp:", "letter": "", "ans": "Phương pháp hiện vật và phương pháp hiện vật quy ước", "subject": "thongke", "part": 0}, {"num": 110, "title": "Nhứng nhân tố nào ảnh h ": "Chỉ phản ánh được đối với sản phẩm vật chất đã hoàn thành", "subject": "thongke", "part": 0}];
let subject = 'all', part = 0, search = '';

function esc(s) {
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function hi(t, q) {
  if (!q) return esc(t);
  return esc(t).replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function render() {
  const pf = document.getElementById('part-filters');
  const d2 = document.getElementById('div2');
  const showParts = subject !== 'thongke';
  pf.style.display = showParts ? 'flex' : 'none';
  d2.style.display = showParts ? 'block' : 'none';

  let data = subject === 'phapluat' ? [...PL] : subject === 'thongke' ? [...TK] : [...PL, ...TK];
  if (part !== 0) data = data.filter(x => x.subject === 'thongke' || x.part === part);
  const q = search.toLowerCase().trim();
  if (q) data = data.filter(x =>
    x.title.toLowerCase().includes(q) ||
    x.ans.toLowerCase().includes(q) ||
    String(x.num).includes(q)
  );

  const total = subject === 'all' ? 519 : subject === 'phapluat' ? 400 : 119;
  document.getElementById('stats').textContent = `Hiển thị ${data.length} / ${total} câu`;

  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  if (!data.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = data.map(item => {
    const s = item.subject;
    const badge = item.letter || '✓';
    return `<div class="card ${s}">
      <div class="card-meta">
        <span class="num-badge ${s}">Câu ${item.num}</span>
        <span class="tag ${s}">${s === 'phapluat' ? '⚖️ Pháp Luật' : '📊 Thống Kê'}</span>
        ${s === 'phapluat' ? `<span class="tag part">Phần ${item.part}</span>` : ''}
      </div>
      <div class="question">${hi(item.title, search)}</div>
      <div class="answer ${s}">
        <div class="ans-badge ${s}">${badge}</div>
        <div class="ans-text ${s}">${hi(item.ans, search)}</div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', e => { search = e.target.value; render(); });
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); subject = b.dataset.subject; render();
}));
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); part = parseInt(b.dataset.part); render();
}));

render();
</script>
